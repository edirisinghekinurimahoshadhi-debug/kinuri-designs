<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KME | Luxury Design Studio</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; background-color: #000;
            color: #D4AF37; font-family: 'Georgia', serif;
            scroll-behavior: smooth;
        }

        /* Loader */
        #loader {
            position: fixed; width: 100%; height: 100vh;
            background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
            transition: opacity 0.8s ease;
        }
        #loader img { width: 100px; animation: pulse 2s infinite ease-in-out; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* Main Wrapper */
        #main-content {
            opacity: 0; visibility: hidden;
            display: flex; flex-direction: column; align-items: center;
            padding: 40px 20px; transition: 1.5s ease;
        }

        .show-content { opacity: 1 !important; visibility: visible !important; }

        /* Design Cards Style */
        .card-frame {
            border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 8px; border-radius: 15px;
            margin-bottom: 30px; background: #0a0a0a;
            max-width: 350px; width: 100%;
        }
        img.design-img { width: 100%; border-radius: 10px; display: block; }

        /* Buttons Section */
        .btn-group { display: flex; flex-direction: column; gap: 15px; margin: 20px 0; width: 250px; }
        
        .luxury-btn {
            background: transparent; color: #D4AF37;
            border: 1px solid #D4AF37; padding: 12px;
            text-transform: uppercase; letter-spacing: 2px;
            text-decoration: none; font-size: 12px;
            border-radius: 50px; transition: 0.4s; cursor: pointer;
            text-align: center;
        }
        .luxury-btn:hover { background: #D4AF37; color: #000; box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }

        .music-toggle { font-size: 10px; opacity: 0.6; cursor: pointer; margin-top: 10px; }

    </style>
</head>
<body onclick="initExperience()">

    <div id="loader">
        <img src="logo-animated.gif.gif" alt="KME Logo">
        <p style="font-size: 10px; letter-spacing: 2px; margin-top: 15px;">TAP TO ENTER</p>
    </div>

    <div id="main-content">
        <div class="card-frame">
            <img src="1.jpg.png" alt="Design 1" class="design-img">
        </div>

        <div class="btn-group">
            <a href="ඔයාගේ_කැන්වා_ලින්ක්_එක_මෙතනට_දාන්න" target="_blank" class="luxury-btn">View Full Portfolio</a>
            <a href="https://wa.me/ඔයාගේ_whatsapp_අංකය" target="_blank" class="luxury-btn">Contact Me</a>
            <div class="music-toggle" onclick="toggleMusic(event)">Toggle Background Music 🎷</div>
        </div>

        <h3 style="letter-spacing: 3px; font-weight: 300; margin-top: 40px;">MORE DESIGNS</h3>
        
        <div class="card-frame">
            <img src="2.png" alt="Design 2" class="design-img">
        </div>

        <div class="card-frame">
            <img src="3.png" alt="Design 3" class="design-img">
        </div>
    </div>

    <audio id="voiceAudio" src="mp3-output-ttsfree(dot)com.mp3"></audio>
    <audio id="bgMusic" src="monume-luxury-509454.mp3" loop></audio>

    <script>
        let hasStarted = false;
        function initExperience() {
            if (hasStarted) return;
            hasStarted = true;
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('main-content').classList.add('show-content');
                document.getElementById('voiceAudio').play();
            }, 800);
        }

        function toggleMusic(event) {
            event.stopPropagation();
            const music = document.getElementById('bgMusic');
            if (music.paused) { music.volume = 0.2; music.play(); } 
            else { music.pause(); }
        }
    </script>
</body>
</html>
