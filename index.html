<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinuri Designs | Portfolio</title>
    <style>
        
    body {
        background-color: #000000;
        color: #D4AF37;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        padding: 0;
        text-align: center;
        animation: fadeInPage 2s ease-in-out;
    }

    @keyframes fadeInPage {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    header {
        padding: 60px 20px;
    }

    /* 2. Logo එකේ පෙනුම (පොඩියට තියෙන්න) */
    .logo {
        width: 150px;
        height: auto;
        margin-bottom: 20px;
        transition: transform 0.3s ease;
    }

    .logo:hover {
        transform: rotate(5deg) scale(1.1);
    }

    /* 3. Title එක දිලිසෙන හැටි */
    h1 {
        font-size: 45px;
        letter-spacing: 5px;
        text-transform: uppercase;
        margin: 10px 0;
        animation: glowText 3s infinite alternate;
    }

    @keyframes glowText {
        from { text-shadow: 0 0 10px rgba(212, 175, 55, 0.4); }
        to { text-shadow: 0 0 30px rgba(212, 175, 55, 0.9); }
    }

    p {
        font-size: 18px;
        color: #ffffff;
        opacity: 0.8;
    }

    /* 4. Designs Grid එක */
    .gallery {
        display: flex;
        justify-content: center;
        gap: 30px;
        padding: 50px;
        flex-wrap: wrap;
    }

    /* 5. පින්තූර තියෙන කොටු (Cards) සහ Animations */
    .card {
        border: 2px solid #D4AF37;
        width: 300px;
        height: 400px;
        background-color: #0a0a0a;
        border-radius: 20px;
        overflow: hidden;
        transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.5s;
        cursor: pointer;
    }

    .card:hover {
        transform: scale(1.08) translateY(-10px);
        box-shadow: 0 10px 30px rgba(212, 175, 55, 0.5);
        border-color: #ffffff;
    }

    .card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: 0.5s;
    }

    .card:hover img {
        transform: scale(1.1);
    }

    /* 6. WhatsApp Button එක */
    footer {
        margin-top: 50px;
        padding-bottom: 80px;
    }

    .contact-btn {
        background-color: #D4AF37;
        color: black;
        padding: 15px 35px;
        text-decoration: none;
        font-weight: bold;
        border-radius: 50px;
        font-size: 18px;
        display: inline-block;
        transition: 0.3s ease;
        box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
    }

    .contact-btn:hover {
        background-color: white;
        transform: translateY(-5px);
        box-shadow: 0 8px 25px rgba(212, 175, 55, 0.6);
    }
    </style>
</head>
<body>

    <header>
        <header>
        <img src="KME.png" alt="Logo" class="logo">
        <h1>KINURI DESIGNS</h1>
        <p>Professional Graphic Designer | Luxury Invitations</p>
    </header>

    <div class="gallery" style="display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; padding: 20px;">
        <div class="card" style="width: 300px; height: 400px; border: 2px solid #D4AF37; border-radius: 15px; overflow: hidden;">
            <img src="1.jpg.png" style="width: 100%; height: 100%; object-fit: cover;">
        </div>
        <div class="card" style="width: 300px; height: 400px; border: 2px solid #D4AF37; border-radius: 15px; overflow: hidden;">
            <img src="2.png" style="width: 100%; height: 100%; object-fit: cover;">
        </div>
        <div class="card" style="width: 300px; height: 400px; border: 2px solid #D4AF37; border-radius: 15px; overflow: hidden;">
            <img src="3.png" style="width: 100%; height: 100%; object-fit: cover;">
        </div>
    </div>

    <footer style="margin-top: 50px; padding-bottom: 50px;">
        <p style="color: white; margin-bottom: 20px;">Interested in working together?</p>
        
        <a href="https://kinuri-portfolio.my.canva.site" class="contact-btn" target="_blank" style="background-color: transparent; border: 2px solid #D4AF37; color: #D4AF37; margin-bottom: 10px;">
            View My Canva Portfolio
        </a>

        <br><br>

        <a href="https://wa.me/94774799172" class="contact-btn" target="_blank">
            Message Me on WhatsApp
        </a>
    </footer>
