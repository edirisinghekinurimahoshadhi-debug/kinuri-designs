<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KME - Premium Experience</title>
    <style>
        /* 1. Logo Loader Screen */
        #loader {
            position: fixed;
            width: 100%;
            height: 100vh;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1s ease;
        }

        #loader img {
            width: 150px;
        }

        /* 2. Page Design */
        body {
            margin: 0;
            background: radial-gradient(circle, #1a1a1a 0%, #000000 100%);
            color: #D4AF37;
            font-family: 'Playfair Display', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            opacity: 0; 
            transition: opacity 1.5s ease;
        }

        /* 3. Business Card Animation */
        .card-container {
            padding: 10px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            transform: translateY(30px);
            transition: 1s ease;
        }

        img.main-card {
            width: 320px;
            border-radius: 10px;
            display: block;
        }

        /* 4. Gold Button Style */
        button {
            margin-top: 40px;
            background: transparent;
            color: #D4AF37;
            border: 1px solid #D4AF37;
            padding: 12px 35px;
            font-size: 14px;
            letter-spacing: 4px;
            cursor: pointer;
            text-transform: uppercase;
            border-radius: 50px;
            transition: 0.4s;
        }

        button:hover {
            background: #D4AF37;
            color: black;
            box-shadow: 0 0 25px #D4AF37;
        }
    </style>
</head>
<body onload="showContent()">

    <div id="loader">
        <img src="logo-animated.gif.gif" alt="Loading...">
    </div>

    <div class="card-container" id="card">
        <img src="1.jpg.png" alt="KME Design" class="main-card">
    </div>

    <button onclick="startExperience()">Experience KME</button>

    <audio id="bgMusic" src="monume-luxury-509454.mp3" loop></audio>
    <audio id="voice" src="mp3-output-ttsfree(dot)com.mp3"></audio>

    <script>
        // Page Loading Logic
        function showContent() {
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                    document.body.style.opacity = '1';
                    document.getElementById('card').style.transform = 'translateY(0)';
                }, 1000);
            }, 2500); 
        }

        // Music and Voice Play Logic
        function startExperience() {
            var music = document.getElementById('bgMusic');
            var voice = document.getElementById('voice');

            music.volume = 0.2; 
            music.play();

            setTimeout(function() {
                voice.play();
            }, 1000);
        }
    </script>

</body>
</html>
