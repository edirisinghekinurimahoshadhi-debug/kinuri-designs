<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KME LUXURY DESIGNS</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            background: #000; color: #D4AF37;
            font-family: 'Playfair Display', serif;
            text-align: center; scroll-behavior: smooth;
        }

        #dustCanvas {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1; opacity: 0.5;
        }

        .header { padding: 60px 20px; }
        .header img { 
            width: 120px; 
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.5));
        }
        .brand-name { 
            font-size: 24px; letter-spacing: 8px; 
            font-weight: bold; margin-top: 20px;
            text-transform: uppercase;
        }

        .gallery { 
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            border: 1px solid rgba(212, 175, 55, 0.1);
            border-radius: 15px; 
            overflow: hidden;
            background: rgba(15, 15, 15, 0.9);
            transition: 0.4s ease;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: #D4AF37;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.2);
        }

        /* වීඩියෝ එක කාඩ් එකට හරියටම ෆිට් වෙන්න */
        .card video, .card img { 
            width: 100%; 
            height: auto; 
            display: block; 
        }

        .btn-container {
            margin: 50px auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            padding-bottom: 100px;
        }

        .lux-btn {
            display: block;
            width: 280px;
            padding: 18px;
            text-decoration: none;
            color: #D4AF37;
            border: 1px solid #D4AF37;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 50px;
            transition: 0.4s all;
            background: rgba(212, 175, 55, 0.05);
        }

        .lux-btn:hover {
            background: #D4AF37;
            color: #000;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            transform: scale(1.05);
        }

        .whatsapp-btn {
            border-color: #25D366;
            color: #25D366;
        }

        .whatsapp-btn:hover {
            background: #25D366;
            color: #fff;
        }
    </style>
</head>
<body onclick="initAudio()">

    <canvas id="dustCanvas"></canvas>

    <div class="header">
        <img src="logo-animated.gif.gif" alt="KME Logo">
        <div class="brand-name">KME LUXURY DESIGNS</div>
    </div>

    <div class="gallery">
        <div class="card">
            <video autoplay loop muted playsinline>
                <source src="KME (4).mp4" type="video/mp4">
            </video>
        </div>

        <div class="card"><img src="1.jpg.png"></div>
        <div class="card"><img src="2.png"></div>
    </div>

    <div class="btn-container">
        <a href="https://canva.link/zbwo5ma56hbqnuz" target="_blank" class="lux-btn">View Portfolio</a>
        <a href="https://wa.me/94774799172" target="_blank" class="lux-btn whatsapp-btn">Contact via WhatsApp</a>
    </div>

    <audio id="bgMusic" src="monume-luxury-509454.mp3" loop></audio>

    <script>
        const canvas = document.getElementById('dustCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5;
                this.speedX = Math.random() * 0.3 - 0.15;
                this.speedY = Math.random() * 0.3 - 0.15;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0; if (this.y > canvas.height) this.y = 0;
            }
            draw() {
                ctx.fillStyle = 'rgba(212, 175, 55, 0.3)';
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }
        for (let i = 0; i < 60; i++) { particles.push(new Particle()); }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        function initAudio() {
            const m = document.getElementById('bgMusic');
            m.volume = 0.2;
            m.play();
        }
    </script>
</body>
</html>
