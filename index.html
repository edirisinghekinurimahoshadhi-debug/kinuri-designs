<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KME - Premium Experience</title>
    <style>
        /* Loader එක හරි තැනට ගමු */
        #loader {
            position: fixed;
            width: 100%;
            height: 100vh;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1s ease;
        }

        #loader img {
            width: 120px; /* ලෝගෝ එක පොඩ්ඩක් කුඩා කළා ෆෝන් එකට ගැලපෙන්න */
        }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle, #1a1a1a 0%, #000000 100%);
            color: #D4AF37;
            font-family: 'Georgia', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* මැදටම ගේන්න */
            min-height: 100vh;
            text-align: center;
            opacity: 0; 
            transition: opacity 1.5s ease;
            overflow: hidden; /* Screen එකෙන් එළියට යෑම වැළැක්වීමට */
        }

        .card-container {
            width: 90%; /* ෆෝන් එකේ පැතිවල නොවදින්න */
            max-width: 350px;
            padding: 5px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            margin-bottom: 20px; /* බටන් එකට ඉඩ තැබීමට */
        }

        img.main-card {
            width: 100%;
            height: auto;
            border-radius: 10px;
            display: block;
        }

        button {
            background: transparent;
            color: #D4AF37;
            border: 1px solid #D4AF37;
            padding: 12px 30px;
            font-size: 13px;
            letter-spacing: 3px;
            cursor: pointer;
            text-transform: uppercase;
            border-radius: 50px;
            transition: 0.4s;
            margin-top: 10px;
        }

        button:active {
            background: #D4AF37;
            color: black;
        }
    </style>
</head>
<body onload="showContent()">

    <div id="loader">
        <img src="logo-animated.gif.gif" alt="Loading...">
    </div>

    <div class="card-container" id="card">
        <img src="1.jpg.png" alt="KME Design" class="main-card">
    </div>

    <button onclick="startExperience()">Experience KME</button>

    <audio id="bgMusic" src="monume-luxury-509454.mp3" loop></audio>
    <audio id="voice" src="mp3-output-ttsfree(dot)com.mp3"></audio>

    <script>
        function showContent() {
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                    document.body.style.opacity = '1';
                }, 1000);
            }, 2000); 
        }

        function startExperience() {
            var music = document.getElementById('bgMusic');
            var voice = document.getElementById('voice');
            music.volume = 0.2; 
            music.play();
            setTimeout(function() {
                voice.play();
            }, 1000);
        }
    </script>

</body>
</html>
