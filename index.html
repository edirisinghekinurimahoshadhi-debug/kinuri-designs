<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KME Luxury Designs | Official Portfolio</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --gold: #D4AF37; --black: #050505; }

        body { 
            background: radial-gradient(circle at center, #1a1508 0%, #050505 70%, #000 100%);
            color: #fff; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            text-align: center; margin: 0; overflow-x: hidden;
        }

        #dust-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        .reveal { opacity: 0; transform: translateY(30px); transition: all 1.2s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        .logo-container {
            margin: 80px auto 10px auto;
            position: relative;
            width: 200px; height: 200px;
            display: flex; align-items: center; justify-content: center;
        }
        .logo-container img { 
            width: 85%; z-index: 2; 
            filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.4));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .brand-name { 
            font-size: 2.2rem; color: var(--gold); letter-spacing: 8px; 
            text-transform: uppercase; margin-bottom: 40px; font-weight: 300;
        }

        /* Sidebar Social Icons */
        .sidebar { 
            position: fixed; left: 0; top: 50%; transform: translateY(-50%);
            background: rgba(212, 175, 55, 0.05); padding: 15px 8px; 
            border-radius: 0 15px 15px 0; z-index: 100; border: 1px solid rgba(212, 175, 55, 0.1); 
            backdrop-filter: blur(10px);
        }
        .sidebar a { display: block; color: var(--gold); margin: 15px 0; font-size: 20px; text-decoration: none; transition: 0.3s; }
        .sidebar a:hover { color: #fff; transform: scale(1.2); }

        section { padding: 80px 10%; border-bottom: 1px solid rgba(212, 175, 55, 0.1); }

        .content-box { 
            max-width: 700px; margin: 0 auto; line-height: 1.8; color: #aaa;
            border: 1px solid rgba(212, 175, 55, 0.1); padding: 35px; border-radius: 20px;
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(5px);
        }

        .luxury-btn {
            display: inline-block; background: transparent; color: var(--gold);
            border: 1px solid var(--gold); padding: 12px 35px; font-size: 13px;
            text-transform: uppercase; letter-spacing: 2px; text-decoration: none;
            border-radius: 50px; transition: 0.4s; cursor: pointer; margin: 10px;
        }
        .luxury-btn:hover { background: var(--gold); color: #000; box-shadow: 0 0 25px rgba(212, 175, 55, 0.4); }

        /* Floating Magic Toolbar (Fixing the visibility) */
        .magic-toolbar {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .tool-icon {
            width: 50px;
            height: 50px;
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold);
            cursor: pointer;
            transition: 0.3s;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        .tool-icon:hover { background: var(--gold); color: #000; }

        .tool-panel {
            position: fixed;
            right: 85px;
            top: 50%;
            transform: translateY(-50%);
            width: 280px;
            background: rgba(10, 10, 10, 0.98);
            border: 1px solid var(--gold);
            border-radius: 15px;
            padding: 20px;
            display: none;
            z-index: 1999;
            box-shadow: 0 0 30px rgba(0,0,0,0.9);
        }

        .panel-active { display: block !important; animation: slideIn 0.3s ease-out; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(-50%) translateX(20px); } }

        .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 40px; }
        .project-card { border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 15px; overflow: hidden; height: 220px; background: #000; position: relative; }
        .project-card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        
        footer { padding: 40px; color: #444; font-size: 11px; }
    </style>
</head>
<body>

    <canvas id="dust-canvas"></canvas>

    <div class="magic-toolbar">
        <div class="tool-icon" onclick="togglePanel('ai-panel')" title="AI Helper"><i class="fas fa-robot"></i></div>
        <div class="tool-icon" onclick="togglePanel('trans-panel')" title="Translate"><i class="fas fa-language"></i></div>
        <div class="tool-icon" onclick="togglePanel('signup-panel')" title="Join VIP"><i class="fas fa-user-plus"></i></div>
        <div class="tool-icon" onclick="window.location.href='subscription.html'" title="Enter Fairy World"><i class="fas fa-wand-sparkles"></i></div>
    </div>

        <input type="text" id="side-ask" placeholder="Ask..." style="width:70%; background:none; border:1px solid var(--gold); color:#fff; padding:5px;">
        <button class="luxury-btn" style="padding:5px 10px; font-size:10px;" onclick="askSideAI()">Ask</button>
    </div>

    <div id="trans-panel" class="tool-panel">
        <h4 style="color:var(--gold)">TRANSLATOR</h4>
        <select id="side-lang" onchange="sideTranslate()" style="width:100%; background:#111; color:var(--gold); border:1px solid var(--gold); padding:5px;">
            <option value="en">English</option>
            <option value="si">Sinhala</option>
            <option value="fr">French</option>
        </select>
    </div>

    <div id="signup-panel" class="tool-panel">
        <h4 style="color:var(--gold)">VIP SIGN UP</h4>
        <input type="text" placeholder="Name" style="width:90%; margin-bottom:10px; background:none; border:1px solid #333; color:#fff; padding:8px;">
        <button class="luxury-btn" style="width:100%" onclick="alert('Signed Up!')">Register</button>
    </div>

    <div class="sidebar">
        <a href="https://www.linkedin.com/in/kinuri-mahoshadhi-edirisinghe-9b4921405" target="_blank"><i class="fab fa-linkedin"></i></a>
        <a href="https://wa.me/94774799172" target="_blank"><i class="fab fa-whatsapp"></i></a>
    </div>

    <div class="logo-container reveal">
        <img src="./logo-animated.gif.gif" alt="KME Logo">
    </div>
    
    <h1 class="brand-name reveal">KME LUXURY DESIGNS</h1>

    <section id="about" class="reveal">
        <h2 style="color: var(--gold); font-weight: 300;">DESIGNER PROFILE</h2>
        <div class="content-box">
            I am <strong style="color: var(--gold);">Kinuri Edirisinghe</strong>, a 14-year-old visionary Graphic Designer.
        </div>
    </section>

    <section id="projects" class="reveal">
        <h2 style="color: var(--gold); font-weight: 300;">SELECTED PROJECTS</h2>
        <div class="portfolio-grid">
            <div class="project-card"><img src="1.jpg.png" alt="P1"></div>
            <div class="project-card"><img src="2.png" alt="P2"></div>
        </div>
    </section>

    <section id="mini-game" class="reveal">
        <h3 style="color: var(--gold);">GOLDEN LEAF CATCHER</h3>
        <div id="game-canvas" style="width: 100%; height: 300px; background: #0a0a0a; border: 1px solid rgba(212,175,55,0.2); position: relative; overflow: hidden; border-radius: 15px;">
            <div id="score" style="position: absolute; top: 10px; left: 10px; color: var(--gold);">Score: 0</div>
        </div>
        <button class="luxury-btn" onclick="startCatchGame()" style="margin-top: 20px;">Play Now</button>
    </section>

    <footer>
        &copy; 2026 KME LUXURY DESIGNS | CERTIFIED DESIGNER
    </footer>

    <script>
        // Reveal Logic
        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
                if (entry.isIntersecting) { entry.target.classList.add('active'); }
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach((el) => observer.observe(el));

        // Toolbar Logic
        function togglePanel(panelId) {
            document.querySelectorAll('.tool-panel').forEach(p => {
                if(p.id !== panelId) p.classList.remove('panel-active');
            });
            document.getElementById(panelId).classList.toggle('panel-active');
        }

        function askSideAI() {
            let q = document.getElementById('side-ask').value;
            let c = document.getElementById('side-chat');
            c.innerHTML += `<p style="color:var(--gold)">You: ${q}</p><p>AI: Processing luxury request...</p>`;
            document.getElementById('side-ask').value = "";
            c.scrollTop = c.scrollHeight;
        }

            let l = document.getElementById('side-lang').value;
            alert("Switching language to: " + l);
        }
