<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KME Elite Kingdom | Pro Access</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --magic: #8a2be2; }
        body {
            background: #000; color: #fff; font-family: 'Segoe UI', sans-serif;
            margin: 0; overflow-x: hidden; text-align: center;
        }
        #magic-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1508, #000);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; transition: 1.5s;
        }
        #fairy-world {
            display: none; min-height: 100vh;
            background: radial-gradient(circle at center, #1a0033 0%, #050505 70%);
            padding: 40px 10%; animation: fadeIn 2s;
        }
        .luxury-btn {
            background: transparent; color: var(--gold); border: 1px solid var(--gold);
            padding: 10px 25px; border-radius: 50px; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px; transition: 0.4s; margin: 10px;
        }
        .luxury-btn:hover { background: var(--gold); color: #000; box-shadow: 0 0 20px var(--gold); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .box { background: rgba(255,255,255,0.03); border: 1px solid rgba(212,175,55,0.2); padding: 25px; border-radius: 15px; backdrop-filter: blur(10px); }
        input, select { background: transparent; border: 1px solid var(--gold); color: white; padding: 10px; border-radius: 5px; width: 80%; margin: 5px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        /* Game Canvas */
        #rain-canvas { width: 100%; height: 200px; background: rgba(0,0,0,0.5); border-radius: 10px; position: relative; overflow: hidden; border: 1px dashed var(--gold); }
    </style>
</head>
<body>

    <div id="magic-overlay">
        <h1 style="color: var(--gold); letter-spacing: 8px;">THE ELITE PORTAL</h1>
        <button class="luxury-btn" onclick="enterWorld()">Enter Fairy Kingdom ✨</button>
    </div>

    <div id="fairy-world">
        <h1 style="color: var(--gold); font-weight: 300;">✨ KME ELITE KINGDOM ✨</h1>
        
        <div class="grid">
            <div class="box">
                <h4><i class="fas fa-gem"></i> PRO GAME: Diamond Rain</h4>
                <p style="font-size: 11px; color: #888;">Catch the falling diamonds!</p>
                <div id="rain-canvas">
                    <div id="rain-score" style="position:absolute; top:5px; left:5px; font-size:12px; color:var(--gold);">Score: 0</div>
                </div>
                <button class="luxury-btn" style="font-size: 10px;" onclick="startRain()">Start Catching</button>
            </div>

            <div class="box">
                <h4><i class="fas fa-robot"></i> KME AI HELPER</h4>
                <div id="chat" style="height:100px; overflow-y:auto; font-size:11px; text-align:left; background:#000; padding:10px; margin-bottom:10px;">
                    AI: Welcome! Ask me about design or exports.
                </div>
                <input type="text" id="ask" placeholder="Type here...">
                <button class="luxury-btn" style="font-size: 10px;" onclick="askAI()">Ask</button>
            </div>

            <div class="box">
                <h4><i class="fas fa-language"></i> TRANSLATOR</h4>
                <select id="lang" onchange="translateSite()">
                    <option value="en">English</option>
                    <option value="si">Sinhala</option>
                    <option value="fr">French</option>
                </select>
                <p id="t-status" style="font-size: 11px; margin-top: 10px;">Select Language</p>
            </div>

            <div class="box">
                <h4><i class="fas fa-user-plus"></i> JOIN THE VAULT</h4>
                <input type="text" placeholder="Your Name">
                <input type="email" placeholder="Your Email">
                <button class="luxury-btn" onclick="alert('Welcome to the Elite List!')">Sign Up</button>
            </div>
        </div>

        <a href="index.html" style="display:block; margin-top:50px; color:#444; font-size:12px; text-decoration:none;">Return to Mortal World</a>
    </div>

    <script>
        function enterWorld() {
            document.getElementById('magic-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('magic-overlay').style.display = 'none';
                document.getElementById('fairy-world').style.display = 'block';
            }, 1000);
        }

        // AI Helper Logic
        function askAI() {
            let q = document.getElementById('ask').value.toLowerCase();
            let c = document.getElementById('chat');
            let a = "AI: I can help you with branding. Contact Kinuri for more.";
            if(q.includes("hi")) a = "AI: Hello Master Designer!";
            if(q.includes("export")) a = "AI: We export premium Jackfruit leaves & Pepper.";
            c.innerHTML += `<p style="color:var(--gold)">Me: ${q}</p><p>${a}</p>`;
            document.getElementById('ask').value = "";
            c.scrollTop = c.scrollHeight;
        }

        // Translator Logic
        function translateSite() {
            let l = document.getElementById('lang').value;
            let s = document.getElementById('t-status');
            if(l === 'si') s.innerText = "දැන් පවතින්නේ සිංහල භාෂාවෙන්";
            else if(l === 'fr') s.innerText = "Maintenant en Français";
            else s.innerText = "Now in English";
        }

        // DIAMOND RAIN GAME
        let rScore = 0;
        function startRain() {
            rScore = 0;
            document.getElementById('rain-score').innerText = "Score: 0";
            let game = setInterval(() => {
                const cvs = document.getElementById('rain-canvas');
                const gem = document.createElement('div');
                gem.innerHTML = "💎";
                gem.style.cssText = `position:absolute; left:${Math.random()*90}%; top:-30px; cursor:pointer; transition: 2s linear; font-size:20px;`;
                cvs.appendChild(gem);
                setTimeout(() => gem.style.top = "200px", 50);
                gem.onclick = () => { rScore++; document.getElementById('rain-score').innerText = "Score: " + rScore; gem.remove(); };
                setTimeout(() => gem.remove(), 2000);
            }, 800);
            setTimeout(() => clearInterval(game), 15000);
        }
    </script>
</body>
</html>
