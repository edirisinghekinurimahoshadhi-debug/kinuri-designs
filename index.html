<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinuri Designs | The Brand</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #D4AF37; 
            --black: #080808; 
            --glass: rgba(255, 255, 255, 0.05);
        }
        
        /* Premium Animated Background */
        body { 
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%) !important;
            color: #fff; 
            font-family: 'Montserrat', sans-serif; 
            margin: 0; 
            text-align: center;
            min-height: 100vh;
        }

        .container { padding: 40px 20px; }

        /* Animated Logo Section */
        .logo-ring {
            width: 140px; height: 140px;
            border: 1px solid var(--gold);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px auto;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(212,175,55,0.2);
            transition: 0.5s;
        }
        .logo-ring img { width: 100%; height: 100%; object-fit: cover; }

        h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: 2.5rem; letter-spacing: 12px; color: var(--gold);
            text-transform: uppercase; margin: 20px 0;
            text-shadow: 0 0 15px rgba(212,175,55,0.3);
        }

        /* Modern Search Box */
        .search-wrapper {
            margin: 40px auto;
            max-width: 400px;
            position: relative;
        }
        #designSearch {
            width: 100%;
            padding: 15px 25px;
            border-radius: 30px;
            border: 1px solid rgba(212,175,55,0.3);
            background: var(--glass);
            color: #fff;
            backdrop-filter: blur(10px);
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }
        #designSearch:focus {
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(212,175,55,0.2);
        }

        /* Portfolio Grid */
        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 25px; 
            max-width: 1100px; 
            margin: 0 auto;
        }

        .design-card { 
            border-radius: 12px; 
            overflow: hidden; 
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .design-card:hover {
            transform: translateY(-10px);
            border-color: var(--gold);
        }
        .design-card img { width: 100%; display: block; transition: 0.5s; }

        /* Branded Footer Buttons */
        footer { margin-top: 80px; padding: 40px; }
        .btn-stack { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        
        .btn { 
            padding: 15px 45px; 
            border-radius: 4px; /* Minimalist Square-ish looks premium */
            text-decoration: none; 
            font-weight: bold; 
            text-transform: uppercase; 
            font-size: 12px; 
            letter-spacing: 2px;
            width: 250px;
            transition: 0.3s;
        }
        .wa-btn { background: var(--gold); color: #000; }
        .canva-btn { border: 1px solid var(--gold); color: var(--gold); }
        .btn:hover { opacity: 0.8; letter-spacing: 4px; }

    </style>
</head>
<body>

    <div class="container">
        <div class="logo-ring">
            <img src="logo-animated.gif.gif" alt="Kinuri Designs Logo">
        </div>

        <h1>KINURI DESIGNS</h1>

        <div class="search-wrapper">
            <input type="text" id="designSearch" placeholder="SEARCH PORTFOLIO..." onkeyup="searchWork()">
        </div>

        <div class="gallery" id="portfolio">
            <div class="design-card" data-title="logo branding">
                <img src="1.jpg.png" alt="Design 1">
            </div>
            <div class="design-card" data-title="social media">
                <img src="2.png" alt="Design 2">
            </div>
            <div class="design-card" data-title="logo identity">
                <img src="3.png" alt="Design 3">
            </div>
        </div>
    </div>

    <footer>
        <div class="btn-stack">
            <a href="https://www.canva.com/design/DAHIDk_RyrA/S04Tfyu4wdQsxeNUvZdrdg/view" target="_blank" class="btn canva-btn">Full Portfolio</a>
            <a href="https://wa.me/94774799172" target="_blank" class="btn wa-btn">Get a Quote</a>
        </div>
    </footer>

    <script>
        function searchWork() {
            let input = document.getElementById('designSearch').value.toLowerCase();
            let cards = document.getElementsByClassName('design-card');
            for (let i = 0; i < cards.length; i++) {
                let title = cards[i].getAttribute('data-title').toLowerCase();
                cards[i].style.display = title.includes(input) ? "block" : "none";
            }
        }
    </script>
</body>
</html>
