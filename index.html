<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KME Premium Experience</title>
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle, #1a1a1a 0%, #000000 100%);
            color: #D4AF37;
            font-family: 'Georgia', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .card-box {
            padding: 15px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            background: rgba(255, 255, 255, 0.02);
            border-radius: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transition: 0.5s;
        }

        .card-box:hover {
            border-color: #D4AF37;
            transform: translateY(-10px);
        }

        img {
            width: 350px;
            border-radius: 10px;
            display: block;
        }

        button {
            margin-top: 30px;
            background: none;
            color: #D4AF37;
            border: 1px solid #D4AF37;
            padding: 12px 30px;
            font-size: 14px;
            letter-spacing: 3px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.4s;
            border-radius: 50px;
        }

        button:hover {
            background: #D4AF37;
            color: black;
            box-shadow: 0 0 20px #D4AF37;
        }
    </style>
</head>
<body>

    <div class="card-box">
        <img src="1.jpg.png" alt="KME Business Card">
    </div>

    <button onclick="playBrandExperience()">Play Experience</button>

    <audio id="bgMusic" src="bg-music.mp3" loop></audio>
    <audio id="brandVoice" src="voice.mp3"></audio>

    <script>
        function playBrandExperience() {
            var music = monume-luxury-509454.mp3;
            var voice = mp3-output-ttsfree(dot_)com.mp3
            // Background music එක හීන් සැරේ පටන් ගන්නවා
            music.volume = 0.2; // සද්දේ අඩු කළා voice එක ඇහෙන්න ඕන නිසා
            music.play();

            // තත්පර 1කට පස්සේ Voice එක ප්ලේ වෙනවා (එතකොට ලස්සනයි)
            setTimeout(function() {
                voice.play();
            }, 1000);
        }
    </script>

</body>
</html>
