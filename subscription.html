<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KME Kingdom | Ultimate Experience</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --blood: #800000; --fairy: #ffb6c1; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; touch-action: manipulation; }

        /* PORTAL & CHOICE */
        #portal-stage {
            height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle, #1a0033, #000); position: relative; transition: 1s; z-index: 100;
        }
        .road {
            width: 200px; height: 100%; background: linear-gradient(to top, var(--gold) 0%, transparent 100%);
            position: absolute; bottom: 0; clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
            opacity: 0.2; animation: flow 2s linear infinite;
        }
        @keyframes flow { from { transform: translateY(0); } to { transform: translateY(20px); } }

        #main-world { display: none; padding: 40px 5%; height: 100vh; overflow-y: auto; text-align: center; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .box { background: rgba(255,255,255,0.03); border: 1.5px solid var(--gold); padding: 20px; border-radius: 20px; }

        /* HORROR ZONE */
        #granny-zone { width: 100%; height: 300px; background: #050000; position: relative; overflow: hidden; border-radius: 15px; border: 1px solid #500; cursor: crosshair; touch-action: none; }
        #light-overlay { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.99); pointer-events: none; z-index: 10; }

        /* LUXURY GOLD RUSH */
        #gold-zone { width: 100%; height: 250px; background: #111; position: relative; overflow: hidden; border-radius: 15px; border: 1px solid var(--gold); }

        .luxury-btn { 
            background: transparent; color: var(--gold); border: 1px solid var(--gold); 
            padding: 12px 25px; border-radius: 50px; cursor: pointer; text-transform: uppercase; 
            margin: 5px; font-size: 11px; transition: 0.4s;
        }
        .luxury-btn:hover { background: var(--gold); color: #000; box-shadow: 0 0 20px var(--gold); }
        
        .candy-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; width: 180px; margin: 15px auto; }
        .candy { width: 40px; height: 40px; background: #111; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="portal-stage">
        <div class="road"></div>
        <h1 style="color: var(--gold); letter-spacing: 8px; z-index: 1;">ELITE KINGDOM</h1>
        <p style="z-index: 1; color: #888; font-style: italic; margin-bottom: 30px;">What is your dream game world?</p>
        <div style="z-index: 1; display: flex; flex-direction: column; gap: 10px; width: 220px;">
            <button class="luxury-btn" onclick="setWorld('fairy')">✨ Fairy World</button>
            <button class="luxury-btn" onclick="setWorld('horror')" style="border-color: #800; color: #ff4d4d;">🏚️ Horror World</button>
            <button class="luxury-btn" onclick="setWorld('luxury')" style="border-color: var(--gold);">💎 Luxury World</button>
        </div>
    </div>

    <div id="main-world">
        <h1 id="world-title" style="letter-spacing: 5px; margin-bottom: 10px;">WELCOME</h1>
        <div id="dynamic-content" class="grid"></div>
        <br><button class="luxury-btn" onclick="location.reload()" style="opacity: 0.5;">← Change World</button>
    </div>

    <script>
        let isHiding = false;
        let score = 0;

        function setWorld(choice) {
            document.getElementById('portal-stage').style.display = 'none';
            const world = document.getElementById('main-world');
            const title = document.getElementById('world-title');
            const content = document.getElementById('dynamic-content');
            world.style.display = 'block';
            
            if (choice === 'fairy') {
                title.innerText = "✨ MAGIC FAIRY LAND"; title.style.color = "#ffb6c1";
                content.innerHTML = `
                    <div class="box"><h4>🍭 CANDY TAP</h4><div id="c-score">Score: 0</div><div id="candy-board" class="candy-grid"></div><button class="luxury-btn" onclick="initCandy()">Reset</button></div>
                    <div class="box"><h4>🧚 MAGIC DUST</h4><p>Catch falling stars!</p><div id="dust-zone" style="height:150px; background:#000; position:relative; overflow:hidden; border:1px dashed #ffb6c1;"></div><button class="luxury-btn" onclick="startDust()">Start</button></div>
                `;
                initCandy();
            } 
            else if (choice === 'horror') {
                title.innerText = "🏚️ THE HORROR MANSION"; title.style.color = "#ff4d4d";
                content.innerHTML = `
                    <div class="box" style="border-color:#500;"><h4>👵 GRANNY: THE ESCAPE</h4>
                        <div id="granny-zone"><div id="light-overlay"></div><img id="g-img" src="https://i.imgur.com/vHInXF6.png" style="position:absolute; width:150px; bottom:-250px; left:50%; transform:translateX(-50%); transition:0.2s;"></div>
                        <button class="luxury-btn" onclick="searchRoom()">Search 🔍</button><button class="luxury-btn" onclick="hideMe()">Hide 🛏️</button>
                    </div>
                `;
                initHorror();
            } 
            else if (choice === 'luxury') {
                title.innerText = "💎 THE GOLDEN VAULT"; title.style.color = "var(--gold)";
                content.innerHTML = `
                    <div class="box"><h4>💰 GOLD RUSH</h4><div id="g-score">Score: 0</div><div id="gold-zone"></div><button class="luxury-btn" onclick="startGold()">Start Collecting</button></div>
                    <div class="box"><h4>🏆 ELITE QUIZ</h4><p>Identify the Luxury Color:</p><div style="width:50px; height:50px; background:#D4AF37; margin:10px auto; border-radius:50%;"></div><button class="luxury-btn" onclick="alert('Correct! That is Metallic Gold.')">Identify</button></div>
                `;
            }
        }

        // --- GAME FUNCTIONS ---
        function initCandy() {
            const board = document.getElementById('candy-board'); score = 0; board.innerHTML = '';
            for(let i=0; i<12; i++) {
                let c = document.createElement('div'); c.className = 'candy'; c.innerHTML = "🍭";
                c.onclick = () => { score++; document.getElementById('c-score').innerText = "Score: "+score; c.innerHTML="✨"; };
                board.appendChild(c);
            }
        }

        function initHorror() {
            const zone = document.getElementById('granny-zone');
            const light = document.getElementById('light-overlay');
            const moveHandler = (e) => {
                if(isHiding) return;
                let r = zone.getBoundingClientRect();
                let x = (e.clientX || e.touches[0].clientX) - r.left;
                let y = (e.clientY || e.touches[0].clientY) - r.top;
                light.style.background = `radial-gradient(circle at ${x}px ${y}px, transparent 10%, rgba(0,0,0,0.99) 30%)`;
            };
            zone.onmousemove = moveHandler; zone.ontouchmove = (e) => { moveHandler(e); e.preventDefault(); };
        }

        function searchRoom() {
            if(isHiding) return;
            if(Math.random() > 0.85) alert("🔑 YOU FOUND THE MASTER KEY!");
            else if(Math.random() < 0.3) {
                document.getElementById('g-img').style.bottom = "0";
                setTimeout(() => { if(!isHiding) { alert("👵: I SEE YOU!"); location.reload(); } else document.getElementById('g-img').style.bottom = "-250px"; }, 600);
            }
        }

        function hideMe() {
            isHiding = true; document.getElementById('light-overlay').style.background = "#000";
            setTimeout(() => { isHiding = false; document.getElementById('light-overlay').style.background = "rgba(0,0,0,0.98)"; }, 3000);
        }

        function startGold() {
            const zone = document.getElementById('gold-zone'); let gScore = 0;
            let game = setInterval(() => {
                let g = document.createElement('div'); g.innerHTML = "💰"; g.style.cssText = `position:absolute; left:${Math.random()*90}%; top:0; cursor:pointer; transition:1.5s linear;`;
                zone.appendChild(g); setTimeout(() => g.style.top = "250px", 50);
                g.onclick = () => { gScore++; document.getElementById('g-score').innerText = "Score: "+gScore; g.remove(); };
            }, 800);
            setTimeout(() => clearInterval(game), 10000);
        }

        function startDust() {
            const zone = document.getElementById('dust-zone');
            for(let i=0; i<10; i++) {
                let s = document.createElement('div'); s.innerHTML = "⭐"; s.style.cssText = `position:absolute; left:${Math.random()*90}%; top:${Math.random()*90}%; cursor:pointer; font-size:10px;`;
                s.onclick = () => s.innerHTML = "✨"; zone.appendChild(s);
            }
        }
    </script>
</body>
</html>
