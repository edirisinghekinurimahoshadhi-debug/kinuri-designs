<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KME Elite Kingdom | Luxury Experience</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --black: #050505; --purple: #a855f7; --aqua: #00ff88; --marvel: #e62429; }

        body { 
            background: radial-gradient(circle at center, #1a1508 0%, #050505 70%, #000 100%);
            color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; overflow-x: hidden;
        }

        #dust-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        .reveal { opacity: 0; transform: translateY(30px); transition: all 1.2s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* HEADER */
        .logo-container { margin: 60px auto 20px; width: 120px; animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .brand-title { font-size: 3rem; letter-spacing: 15px; font-weight: 100; color: #fff; text-shadow: 0 0 20px rgba(212,175,55,0.4); margin: 0; }

        /* HUB SYSTEM */
        .hub-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; padding: 0 8%; margin-top: 50px; }
        .hub-card { position: relative; height: 320px; border-radius: 25px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); transition: 0.5s; cursor: pointer; background-size: cover; background-position: center; }
        .hub-card:hover { border-color: var(--gold); transform: translateY(-10px); box-shadow: 0 0 30px rgba(212,175,55,0.2); }
        .hub-overlay { position: absolute; bottom: 0; width: 100%; padding: 25px 0; background: linear-gradient(transparent, rgba(0,0,0,0.9)); }

        /* HUB OVERLAY SYSTEM */
        .hub-display { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 10000; background: rgba(0,0,0,0.98); display: none; align-items: center; justify-content: center; backdrop-filter: blur(20px); }
        .hub-inner { width: 90%; max-width: 900px; max-height: 85vh; overflow-y: auto; padding: 40px; background: rgba(255,255,255,0.02); border: 1px solid var(--gold); border-radius: 30px; }

        .luxury-btn { display: inline-block; background: transparent; color: var(--gold); border: 1px solid var(--gold); padding: 10px 25px; border-radius: 50px; text-decoration: none; transition: 0.4s; letter-spacing: 2px; font-size: 10px; margin: 10px; cursor: pointer; }
        .luxury-btn:hover { background: var(--gold); color: #000; box-shadow: 0 0 20px var(--gold); }

        /* TOOLBAR */
        .magic-toolbar { position: fixed; right: 20px; top: 50%; transform: translateY(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 15px; }
        .tool-icon { width: 45px; height: 45px; background: rgba(10,10,10,0.9); border: 1px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--gold); cursor: pointer; transition: 0.3s; }
        .tool-icon:hover { background: var(--gold); color: #000; }

        iframe { width: 100%; height: 70vh; border: 1px solid var(--gold); border-radius: 20px; }
        footer { padding: 60px; color: #444; font-size: 11px; }
    </style>
</head>
<body>

    <canvas id="dust-canvas"></canvas>

    <div class="magic-toolbar">
        <div class="tool-icon" onclick="alert('KME AI: Virtual Assistant Active!')"><i class="fas fa-robot"></i></div>
        <div class="tool-icon" onclick="window.open('https://wa.me/94774799172')"><i class="fab fa-whatsapp"></i></div>
    </div>

    <div class="logo-container reveal">
        <img src="./logo-animated.gif.gif" alt="Logo" style="width: 100%;">
    </div>
    <h1 class="brand-title reveal">ELITE KINGDOM</h1>

    <section class="reveal">
        <div class="hub-grid">
            <div class="hub-card" style="background-image: url('https://images.unsplash.com/photo-1612036782180-6f0b6cd846fe?auto=format&fit=crop&q=80&w=800');" onclick="openEliteHub('marvel')">
                <div class="hub-overlay">
                    <h3 style="color:var(--marvel);">MARVELOUS HUB</h3>
                    <p style="font-size:9px; letter-spacing:2px;">CINEMATIC MULTIVERSE</p>
                </div>
            </div>
            <div class="hub-card" style="background-image: url('https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&q=80&w=800');" onclick="openEliteHub('gaming')">
                <div class="hub-overlay">
                    <h3 style="color:var(--purple);">GAMING HUB</h3>
                    <p style="font-size:9px; letter-spacing:2px;">ARCADE ADVENTURE</p>
                </div>
            </div>
            <div class="hub-card" style="background-image: url('Gemini_Generated_Image_zc8ozgzc8ozgzc8o.png');" onclick="openEliteHub('aqua')">
                <div class="hub-overlay">
                    <h3 style="color:var(--aqua);">AQUA LEAF</h3>
                    <p style="font-size:9px; letter-spacing:2px;">ORGANIC ASSETS</p>
                </div>
            </div>
        </div>
    </section>

    <div id="hub-display" class="hub-display">
        <div class="hub-inner">
            <div id="hub-content"></div>
            <button class="luxury-btn" onclick="closeEliteHub()">CLOSE KINGDOM</button>
        </div>
    </div>

    <footer>
        <p>ELITE KINGDOM © 2026 | KINURI EDIRISINGHE</p>
        <p style="margin-top:10px;">CERTIFIED CANVA DESIGNER</p>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            document.querySelectorAll('.reveal').forEach(el => el.classList.add('active'));
        });

        function openEliteHub(type) {
            const display = document.getElementById('hub-display');
            const content = document.getElementById('hub-content');
            display.style.display = 'flex';
            
            // Magic Dust Burst Effect
            triggerDustBurst(type);

            if(type === 'marvel') {
                content.innerHTML = `
                    <h2 style="color:var(--marvel); letter-spacing:5px;">MARVELOUS HUB</h2>
                    <p style="font-size:13px; color:#aaa;">Explore the Cinematic Universe of KME Designs.</p>
                    <div style="text-align:left; padding:20px; border:1px solid var(--marvel); border-radius:15px; margin-top:20px;">
                        <h4 style="color:#fff;">The multiverse of Branding</h4>
                        <p style="font-size:12px; line-height:1.6;">In the Marvelous Hub, we apply comic-style storytelling to business identities. Just like a superhero, every brand needs an origin story and a visual power. Our edits blend high-action visuals with luxury typography.</p>
                    </div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:20px;">
                        <div style="background:rgba(230,36,41,0.1); padding:10px; border-radius:10px;">VIEW AVENGERS EDITS</div>
                        <div style="background:rgba(230,36,41,0.1); padding:10px; border-radius:10px;">ORDER MOVIE POSTERS</div>
                    </div>
                `;
            } else if(type === 'gaming') {
                content.innerHTML = `
                    <h2 style="color:var(--purple); letter-spacing:5px;">GAMING HUB</h2>
                    <div style="margin-bottom:20px;">
                        <button class="luxury-btn" onclick="loadGame('https://www.google.com/logos/2010/pacman10-i.html')">PLAY PACMAN GOLD</button>
                        <button class="luxury-btn" onclick="loadGame('https://www.retrogames.cc/embed/40238-super-mario-64-usa.html')">PLAY MARIO ELITE</button>
                    </div>
                    <div id="game-container"></div>
                `;
            } else if(type === 'aqua') {
                content.innerHTML = `
                    <h2 style="color:var(--aqua); letter-spacing:5px;">AQUA LEAF</h2>
                    <img src="Gemini_Generated_Image_zc8ozgzc8ozgzc8o.png" style="width:100%; max-width:300px; border-radius:20px; margin:20px 0;">
                    <div style="text-align:left; color:#ccc; font-size:12px;">
                        <p><b>Sustainable Branding:</b> Aqua Leaf focuses on Sri Lankan organic exports. Our design philosophy uses the Jackfruit leaf's texture to represent longevity and strength.</p>
                        <ul>
                            <li>Premium Packaging Design</li>
                            <li>Eco-friendly Color Palettes</li>
                            <li>Verified Organic Asset Kits</li>
                        </ul>
                    </div>
                `;
            }
        }

        function loadGame(url) {
            document.getElementById('game-container').innerHTML = `<iframe src="${url}"></iframe>`;
        }

        function triggerDustBurst(type) {
            let color = type === 'marvel' ? '#e62429' : (type === 'gaming' ? '#a855f7' : '#00ff88');
            for(let i=0; i<40; i++) {
                let p = document.createElement('div');
                p.style.position = 'fixed'; p.style.left = '50%'; p.style.top = '50%';
                p.style.width = '4px'; p.style.height = '4px'; p.style.background = color;
                p.style.borderRadius = '50%'; p.style.zIndex = '11000';
                p.style.boxShadow = `0 0 10px ${color}`;
                document.body.appendChild(p);
                let angle = Math.random() * Math.PI * 2;
                let vel = 2 + Math.random() * 10;
                let dx = Math.cos(angle) * vel;
                let dy = Math.sin(angle) * vel;
                let op = 1;
                let anim = setInterval(() => {
                    p.style.left = (parseFloat(p.style.left) + dx) + 'px';
                    p.style.top = (parseFloat(p.style.top) + dy) + 'px';
                    op -= 0.02; p.style.opacity = op;
                    if(op <= 0) { clearInterval(anim); p.remove(); }
                }, 16);
            }
        }

        function closeEliteHub() { 
            document.getElementById('hub-display').style.display = 'none'; 
            document.getElementById('game-container').innerHTML = '';
        }

        const canvas = document.getElementById('dust-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        for(let i=0; i<60; i++) particles.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, size:Math.random()*1.5, speed:Math.random()*0.4, opacity:Math.random()});
        function animateDust() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            particles.forEach(p => {
                ctx.fillStyle = `rgba(212, 175, 55, ${p.opacity})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
                p.y -= p.speed; if(p.y < 0) p.y = canvas.height;
            });
            requestAnimationFrame(animateDust);
        }
        animateDust();
    </script>
</body>
</html>
