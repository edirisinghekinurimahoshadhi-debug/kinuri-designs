<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KME Elite Kingdom | Luxury Hubs</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --deep-bg: #050505; }
        body { 
            background: radial-gradient(circle at center, #1a1508 0%, #050505 70%, #000 100%);
            color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden;
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        .container { padding: 60px 8%; text-align: center; }
        .header-title { font-size: 2.8rem; color: var(--gold); letter-spacing: 10px; text-transform: uppercase; font-weight: 300; }
        .sub-text { color: #888; font-size: 14px; letter-spacing: 3px; margin-bottom: 50px; }

        .service-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        
        .premium-box { 
            background: rgba(255, 255, 255, 0.02); 
            border: 1px solid rgba(212, 175, 55, 0.15); 
            padding: 35px 25px; border-radius: 20px; backdrop-filter: blur(12px);
            transition: 0.4s; cursor: pointer;
        }
        .premium-box:hover { border-color: var(--gold); transform: translateY(-5px); box-shadow: 0 10px 40px rgba(212, 175, 55, 0.1); }

        .luxury-btn { 
            display: inline-block; background: transparent; color: var(--gold); 
            border: 1px solid var(--gold); padding: 10px 25px; border-radius: 50px; 
            text-transform: uppercase; letter-spacing: 2px; font-size: 10px; text-decoration: none; transition: 0.4s;
        }
        .luxury-btn:hover { background: var(--gold); color: #000; }

        /* HUB STYLES */
        .hub-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 3000; background: rgba(0,0,0,0.98); display: none; align-items: center; justify-content: center; flex-direction: column; backdrop-filter: blur(15px); }
        .hub-content { width: 90%; max-width: 800px; text-align: center; }
        .hub-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 20px; margin-top: 30px; }
        
        .reveal { opacity: 0; transform: translateY(20px); transition: 1s; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        footer { margin-top: 80px; padding: 40px; color: #444; font-size: 10px; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="header-title reveal">Elite Kingdom</h1>
        <p class="sub-text reveal">THE ALL-IN-ONE LUXURY ECOSYSTEM</p>

        <div class="service-grid">
            <div class="premium-box reveal" onclick="openHub('studio')">
                <i class="fas fa-crown" style="color:var(--gold); font-size: 30px; margin-bottom: 15px;"></i>
                <h3>STUDIO HUB</h3>
                <p style="color:#777; font-size:12px;">Premium Branding & Portfolio</p>
                <button class="luxury-btn">Enter Hub</button>
            </div>

            <div class="premium-box reveal" onclick="openHub('vault')">
                <i class="fas fa-gem" style="color:var(--gold); font-size: 30px; margin-bottom: 15px;"></i>
                <h3>VAULT HUB</h3>
                <p style="color:#777; font-size:12px;">Digital Assets & Templates</p>
                <button class="luxury-btn">Enter Hub</button>
            </div>

            <div class="premium-box reveal" onclick="openHub('game')">
                <i class="fas fa-gamepad" style="color:var(--gold); font-size: 30px; margin-bottom: 15px;"></i>
                <h3>GAMING HUB</h3>
                <p style="color:#777; font-size:12px;">3D Survival & Classics</p>
                <button class="luxury-btn">Enter Hub</button>
            </div>
        </div>

        <footer>&copy; 2026 KME LUXURY DESIGNS | OFFICIAL BUSINESS PAGE</footer>
    </div>

    <div id="hub-overlay" class="hub-overlay">
        <div style="position:absolute; top:20px; right:20px;">
            <button onclick="closeHub()" class="luxury-btn">CLOSE HUB</button>
        </div>
        <div id="hub-dynamic-content" class="hub-content">
            </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            document.querySelectorAll('.reveal').forEach(el => el.classList.add('active'));
        });

        function openHub(type) {
            const overlay = document.getElementById('hub-overlay');
            const content = document.getElementById('hub-dynamic-content');
            overlay.style.display = 'flex';
            
            if(type === 'studio') {
                content.innerHTML = `
                    <h2 style="color:var(--gold); letter-spacing:5px;">STUDIO HUB</h2>
                    <p style="color:#555; font-size:12px;">KME PREMIUM DESIGN PORTFOLIO</p>
                    <div class="hub-grid">
                        <div class="premium-box"><h4>LOGOS</h4><p style="font-size:10px;">Coming Soon</p></div>
                        <div class="premium-box"><h4>POSTERS</h4><p style="font-size:10px;">Coming Soon</p></div>
                        <div class="premium-box" onclick="window.location.href='https://wa.me/94774799172'"><h4>ORDER NOW</h4></div>
                    </div>
                `;
            } else if(type === 'vault') {
                content.innerHTML = `
                    <h2 style="color:var(--gold); letter-spacing:5px;">VAULT HUB</h2>
                    <p style="color:#555; font-size:12px;">CURATED DESIGN ASSETS</p>
                    <div class="hub-grid">
                        <div class="premium-box"><h4>CANVA PRO</h4><p style="font-size:10px;">Rs. 500/=</p></div>
                        <div class="premium-box"><h4>UI KITS</h4><p style="font-size:10px;">Rs. 1500/=</p></div>
                        <div class="premium-box" onclick="window.location.href='https://wa.me/94774799172'"><h4>BUY NOW</h4></div>
                    </div>
                    } else if(type === 'vault') {
        content.innerHTML = `
            <h2 style="color:var(--gold); letter-spacing:5px; margin-bottom:5px;">VAULT HUB</h2>
            <p style="color:#555; font-size:10px; margin-bottom:30px;">PREMIUM DIGITAL ASSETS</p>
            
            <div class="hub-grid">
                <div class="premium-box" onclick="window.location.href='https://wa.me/94774799172?text=Hello Kinuri, I want to buy the Elite Template 01'">
                    <img src="https://i.ibb.co/wrLBb0tv/Screenshot-2026-05-10-190318.png" 
                         style="width:100%; height:150px; object-fit:cover; border-radius:10px; border:1px solid rgba(212,175,55,0.3);">
                    <h4 style="color:var(--gold); margin-top:15px; font-size:12px;">ELITE TEMPLATE 01</h4>
                    <p style="color:#888; font-size:10px;">Price: Rs. 500/=</p>
                    <button class="luxury-btn" style="padding:5px 15px; font-size:8px; margin-top:10px;">BUY NOW</button>
                </div>

                <div class="premium-box" style="display:flex; align-items:center; justify-content:center; border:1px dashed #333;">
                    <p style="color:#444; font-size:10px;">MORE ASSETS COMING SOON</p>
                </div>
            </div>
        `;
                `;
            } else if(type === 'game') {
                content.innerHTML = `
                    <h2 style="color:var(--gold); letter-spacing:5px;">GAMING HUB</h2>
                    <div class="hub-grid">
                        <div class="premium-box" onclick="loadFrame('https://www.retrogames.cc/embed/40238-super-mario-64-usa.html')"><h4>ADVENTURE</h4></div>
                        <div class="premium-box" onclick="loadFrame('https://www.google.com/logos/2010/pacman10-i.html')"><h4>CLASSIC</h4></div>
                    </div>
                `;
            }
        }

        function loadFrame(url) {
            document.getElementById('hub-dynamic-content').innerHTML = `
                <iframe src="${url}" frameborder="0" width="100%" height="80vh" style="border-radius:20px; border:1px solid var(--gold);"></iframe>
                <button onclick="closeHub()" class="luxury-btn" style="margin-top:20px;">BACK</button>
            `;
        }

        function closeHub() { document.getElementById('hub-overlay').style.display = 'none'; }
    </script>
</body>
</html>
