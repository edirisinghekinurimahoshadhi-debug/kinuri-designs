<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KME | LUXURY</title>
    <style>
        body {
            background-color: #000;
            color: #D4AF37;
            font-family: 'Playfair Display', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }

        /* 1. Golden Glowing Buttons */
        .lux-btn {
            width: 250px;
            background: transparent;
            color: #D4AF37;
            border: 1px solid #D4AF37;
            padding: 14px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-decoration: none;
            border-radius: 50px;
            text-align: center;
            font-size: 12px;
            margin: 10px 0;
            transition: all 0.3s ease;
            cursor: pointer;
            outline: none;
            position: relative;
            overflow: hidden;
        }

        /* බටන් එක ක්ලික් කරනකොට දිලිසෙන ඉෆෙක්ට් එක */
        .lux-btn:active, .lux-btn:focus {
            background: #D4AF37;
            color: #000;
            box-shadow: 0 0 30px #D4AF37, 0 0 60px rgba(212, 175, 55, 0.6);
            transform: scale(0.95);
        }

        /* ලස්සනට පාවෙලා එන ඇනිමේෂන් එක */
        .lux-btn:hover {
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
            letter-spacing: 4px;
        }

        .header img { width: 120px; margin-bottom: 20px; }
        .glow-text {
            font-size: 22px;
            letter-spacing: 5px;
            text-shadow: 0 0 10px #D4AF37;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo-animated.gif.gif" alt="KME Logo">
        <div class="glow-text">KME LUXURY DESIGNS</div>
    </div>

    <button class="lux-btn" onclick="startExperience()">Experience KME</button>
    
    <a href="https://canva.link/zbwo5ma56hbqnuz" target="_blank" class="lux-btn">View Portfolio</a>
    <a href="https://wa.me/94760517560" target="_blank" class="lux-btn">Contact Me</a>

    <audio id="voice" src="mp3-output-ttsfree(dot)com.mp3"></audio>
    <audio id="bgMusic" src="monume-luxury-509454.mp3" loop></audio>

    <script>
        function startExperience() {
            var voice = document.getElementById('voice');
            var music = document.getElementById('bgMusic');

            // Voice එකයි Music එකයි දෙකම මෙතනදීම පටන් ගන්නවා
            voice.play();
            
            // මියුසික් එක හෙමින් පසුබිමෙන් ඇහෙන්න සෙට් කරනවා
            music.volume = 0.2;
            music.play();
        }
    </script>

</body>
</html>
