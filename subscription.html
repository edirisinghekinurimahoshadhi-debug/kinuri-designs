<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KME Fairy World | Luxury Games</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --magic: #4b0082; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }

        /* ROAD ANIMATION */
        #portal-stage {
            height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(to bottom, #000, #1a0033); position: relative;
        }
        .road {
            width: 200px; height: 100%; background: linear-gradient(to top, var(--gold) 0%, transparent 100%);
            position: absolute; bottom: 0; clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
            opacity: 0.3; animation: flow 2s linear infinite;
        }
        @keyframes flow { from { transform: translateY(0); } to { transform: translateY(20px); } }

        #fairy-world { display: none; padding: 40px 5%; animation: fadeIn 2s; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .box { background: rgba(255,255,255,0.03); border: 1px solid var(--gold); padding: 20px; border-radius: 15px; }
        
        /* Candy Game Grid */
        .candy-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; width: 200px; margin: 10px auto; }
        .candy { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; font-size: 20px; background: #111; border-radius: 5px; cursor: pointer; }

        .luxury-btn { background: transparent; color: var(--gold); border: 1px solid var(--gold); padding: 10px 20px; border-radius: 50px; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="portal-stage">
        <div class="road"></div>
        <h1 style="color: var(--gold); letter-spacing: 10px; z-index: 1;">FAIRY WORLD</h1>
        <p style="z-index: 1; color: #888;">Walking down the magic path...</p>
        <button class="luxury-btn" onclick="enterKingdom()" style="z-index: 1;">Step In ✨</button>
    </div>

    <div id="fairy-world">
        <h1 style="color: var(--gold); font-weight: 300;">✨ THE GAME KINGDOM ✨</h1>
        
        <div class="grid">
            <div class="box">
                <h4>🍭 CANDY CRUSH MINI</h4>
                <p style="font-size: 11px;">Tap candies to score!</p>
                <div class="candy-grid" id="candy-board"></div>
                <div id="candy-score" style="color: var(--gold);">Score: 0</div>
                <button class="luxury-btn" style="font-size: 10px;" onclick="initCandy()">Reset</button>
            </div>

            <div class="box">
                <h4>🍃 GOLDEN LEAF CATCHER</h4>
                <div id="leaf-zone" style="height: 150px; background: #000; position: relative; overflow: hidden; border: 1px solid #333;">
                    <div id="leaf-score" style="position:absolute; top:5px; left:5px; color:gold; font-size:12px;">Score: 0</div>
                </div>
                <button class="luxury-btn" style="font-size: 10px;" onclick="startLeafGame()">Start Catching</button>
            </div>

            <div class="box">
                <h4>💎 DIAMOND RAIN</h4>
                <button class="luxury-btn" onclick="alert('Starting Diamond Rain...')">Play Diamond Rain</button>
            </div>
        </div>

        <a href="index.html" style="display:block; margin-top:40px; color:#444; text-decoration:none;">← Return Home</a>
    </div>

    <script>
        function enterKingdom() {
            document.getElementById('portal-stage').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('portal-stage').style.display = 'none';
                document.getElementById('fairy-world').style.display = 'block';
                initCandy();
            }, 1000);
        }

        // CANDY MINI GAME
        let cScore = 0;
        const candies = ['🍎', '🍬', '🍭', '🍩', '🍇'];
        function initCandy() {
            const board = document.getElementById('candy-board');
            board.innerHTML = '';
            for(let i=0; i<16; i++) {
                const c = document.createElement('div');
                c.className = 'candy';
                c.innerHTML = candies[Math.floor(Math.random()*candies.length)];
                c.onclick = () => { cScore += 10; document.getElementById('candy-score').innerText = "Score: " + cScore; c.innerHTML = candies[Math.floor(Math.random()*candies.length)]; };
                board.appendChild(c);
            }
        }

        // LEAF CATCHER LOGIC
        let lScore = 0;
        function startLeafGame() {
            lScore = 0;
            const zone = document.getElementById('leaf-zone');
            let game = setInterval(() => {
                const leaf = document.createElement('div');
                leaf.innerHTML = "🍃";
                leaf.style.cssText = `position:absolute; left:${Math.random()*90}%; top:-20px; transition: 2s linear; cursor:pointer;`;
                zone.appendChild(leaf);
                setTimeout(() => leaf.style.top = "150px", 50);
                leaf.onclick = () => { lScore++; document.getElementById('leaf-score').innerText = "Score: " + lScore; leaf.remove(); };
                setTimeout(() => leaf.remove(), 2000);
            }, 800);
            setTimeout(() => clearInterval(game), 15000);
        }
    </script>
</body>
</html>
