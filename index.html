<!DOCTYPE html>

    <style>
        :root { 
            --gold: #D4AF37; 
            --black: #050505; 
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(212, 175, 55, 0.2);
            --purple: #a855f7;
            --marvel: #e62429;
            --aqua: #00ff88;
        }

        /* 1. GOLDEN SCROLLBAR */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--black); }
        ::-webkit-scrollbar-thumb { 
            background: linear-gradient(var(--black), var(--gold), var(--black)); 
            border-radius: 10px; 
        }

        body { 
            background-color: var(--black);
            color: #fff; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            overflow-x: hidden;
            line-height: 1.6;
        }

        #dust-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        .reveal { opacity: 0; transform: translateY(30px); transition: all 1s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* HEADER & LOGO */
        .logo-container { margin: 60px auto 20px; width: 130px; animation: float 4s ease-in-out infinite; filter: drop-shadow(0 0 15px var(--gold)); }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        
        header { padding: 100px 20px 60px; text-align: center; }
        .main-title { font-size: 3rem; letter-spacing: 15px; font-weight: 100; margin: 0; text-transform: uppercase; }
        .hero-tagline { color: var(--gold); letter-spacing: 5px; font-size: 1.2rem; margin-top: 10px; }

        /* BUTTONS */
        .btn-container { margin-top: 40px; display: flex; justify-content: center; gap: 20px; }
        .luxury-btn { 
            padding: 15px 40px; border-radius: 50px; text-decoration: none; 
            letter-spacing: 2px; font-size: 12px; transition: 0.4s; 
            text-transform: uppercase; border: 1px solid var(--gold);
            color: var(--gold); background: transparent; cursor: pointer;
        }
        .luxury-btn.filled { background: var(--gold); color: #000; font-weight: bold; }
        .luxury-btn:hover { box-shadow: 0 0 25px var(--gold); transform: scale(1.05); }

        /* SECTION STYLING */
        section { padding: 100px 10%; max-width: 1200px; margin: 0 auto; }
        .section-title { color: var(--gold); letter-spacing: 5px; text-transform: uppercase; margin-bottom: 50px; font-weight: 300; }

        .glass-box { 
            background: var(--glass); border: 1px solid var(--border); 
            padding: 50px; border-radius: 30px; backdrop-filter: blur(15px);
        }

        /* HUB GRID */
        .hub-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .hub-card { 
            height: 400px; border-radius: 25px; overflow: hidden; border: 1px solid var(--border);
            position: relative; cursor: pointer; transition: 0.5s; background-size: cover; background-position: center;
        }
        .hub-card:hover { transform: translateY(-15px); border-color: var(--gold); }
        .hub-overlay { 
            position: absolute; bottom: 0; width: 100%; padding: 30px; 
            background: linear-gradient(transparent, rgba(0,0,0,0.9)); box-sizing: border-box;
        }

        /* OVERLAY SYSTEM (FOR GAMES & ARTICLES) */
        .hub-display { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10001; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; backdrop-filter: blur(20px); }
        .hub-inner { width: 90%; max-width: 900px; max-height: 85vh; background: var(--black); border: 1px solid var(--gold); border-radius: 35px; padding: 40px; overflow-y: auto; position: relative; }
        .close-hub { position: absolute; top: 20px; right: 20px; color: var(--gold); font-size: 30px; cursor: pointer; }

        /* MAGIC TOOLBAR */
        .magic-toolbar { position: fixed; right: 25px; top: 50%; transform: translateY(-50%); z-index: 1000; display: flex; flex-direction: column; gap: 20px; }
        .tool-icon { 
            width: 50px; height: 50px; background: rgba(10,10,10,0.9); border: 1px solid var(--gold); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            color: var(--gold); cursor: pointer; transition: 0.3s;
        }
        .tool-icon:hover { background: var(--gold); color: #000; box-shadow: 0 0 20px var(--gold); }

        /* GAME LIST STYLING */
        .game-item { background: rgba(168, 85, 247, 0.1); border: 1px solid var(--purple); padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .game-item.premium { border-color: var(--gold); background: rgba(212, 175, 55, 0.1); }
        
        footer { padding: 80px 20px; text-align: center; border-top: 1px solid var(--border); }
    </style>
</head>

    <script>
        // Reveal on Scroll
        document.addEventListener("DOMContentLoaded", () => {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => { if(entry.isIntersecting) entry.target.classList.add('active'); });
            }, { threshold: 0.1 });
            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        });

        // Dust Background Logic
        const canvas = document.getElementById('dust-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        for(let i=0; i<70; i++) particles.push({
            x: Math.random() * canvas.width, 
            y: Math.random() * canvas.height, 
            size: Math.random() * 1.5, 
            speed: Math.random() * 0.5 + 0.1, 
            opacity: Math.random()
        });
        function animateDust() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            particles.forEach(p => {
                ctx.fillStyle = `rgba(212, 175, 55, ${p.opacity})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
                p.y -= p.speed; if(p.y < 0) p.y = canvas.height;
            });
            requestAnimationFrame(animateDust);
        }
        animateDust();
    </script>
