
    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KME - Premium Designs</title>
    <style>
        body {
            margin: 0;
            background-color: #0a0a0a;
            color: #D4AF37;
            font-family: 'Playfair Display', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .card-container {
            position: relative;
            cursor: pointer;
            transition: transform 0.5s ease;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
            border: 2px solid #D4AF37;
            border-radius: 10px;
        }

        .card-container:hover {
            transform: scale(1.05);
        }

        img {
            width: 350px;
            display: block;
            border-radius: 8px;
        }

        .controls {
            margin-top: 30px;
            text-align: center;
        }

        button {
            background: transparent;
            color: #D4AF37;
            border: 1px solid #D4AF37;
            padding: 10px 25px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 20px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        button:hover {
            background: #D4AF37;
            color: black;
        }

        .tagline {
            margin-top: 15px;
            font-style: italic;
            opacity: 0.8;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="card-container" onclick="playAll()">
        <img src="1.jpg.png" alt="KME Business Card">
    </div>

    <div class="controls">
        <button onclick="playAll()">Experience KME</button>
        <p class="tagline">"Create your dream design"</p>
    </div>

    <audio id="voiceAudio" src="voice.mp3"></audio>
    <audio id="bgMusic" src="bg-music.mp3" loop></audio>

    <script>
        function playAll() {
            var voice = document.getElementById('voiceAudio');
            var music = document.getElementById('bgMusic');
            
            // Music එක හීන් සැරේ ප්ලේ වෙන්න (Low volume)
            music.volume = 0.3; 
            music.play();

            // Voice එක ප්ලේ වෙන්න
            voice.play();
        }
    </script>

</body>
</html>
