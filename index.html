<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinuri Designs | Interactive Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #D4AF37; font-family: 'Montserrat', sans-serif; margin: 0; text-align: center; scroll-behavior: smooth; }
        .container { padding: 40px 20px; }
        
        /* Search Bar */
        .search-container { margin: 30px auto; max-width: 500px; }
        #designSearch {
            width: 80%; padding: 15px 25px; border-radius: 50px; border: 1px solid #D4AF37;
            background: transparent; color: #fff; font-size: 1rem; outline: none; transition: 0.3s;
        }

        /* Portfolio Gallery - Fixed Photo Size */
        .gallery { display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; padding: 40px 10px; }
        .design-card { width: 320px; border-radius: 15px; overflow: hidden; border: 1px solid #222; transition: 0.4s; }
        .design-card img { width: 100%; height: auto; display: block; filter: brightness(0.8); transition: 0.5s; }
        .design-card:hover { transform: translateY(-10px); border-color: #D4AF37; box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3); }
        .design-card:hover img { filter: brightness(1.1); transform: scale(1.05); }

        /* Feedback Section */
        .feedback-section { padding: 80px 20px; background: #0a0a0a; border-top: 1px solid #1a1a1a; }
        .feedback-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .feedback-card { background: #111; border-left: 4px solid #D4AF37; padding: 25px; width: 280px; border-radius: 8px; text-align: left; transition: 0.3s; }
        .feedback-card:hover { background: #1a1a1a; transform: scale(1.02); }
        .feedback-card p { font-style: italic; color: #ccc; font-size: 0.9rem; margin: 0; }
        .feedback-card h4 { margin: 15px 0 0 0; color: #D4AF37; font-size: 0.9rem; text-transform: uppercase; }

        /* Footer & Buttons */
        footer { padding: 80px 20px; border-top: 1px solid #1a1a1a; }
        .btn { display: inline-block; padding: 15px 35px; margin: 10px; border-radius: 50px; text-decoration: none; font-weight: bold; transition: 0.3s; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }
        .wa-btn { background: #D4AF37; color: #000; }
        .canva-btn { border: 2px solid #D4AF37; color: #D4AF37; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1 style="font-family: 'Playfair Display', serif; font-size: 3rem; margin-bottom: 10px;">KINURI DESIGNS</h1>
        <p style="color: #888; letter-spacing: 2px;">GRAPHIC DESIGNER & BRANDING EXPERT</p>

        <div class="search-container">
            <input type="text" id="designSearch" placeholder="Try searching 'Logo' or 'Branding'..." onkeyup="filterDesigns()">
        </div>

      
               <div class="gallery" id="designGallery">
    <div class="design-card" data-category="logo">
        <img src="1.jpg.png" alt="Logo Design">
    </div>
    <div class="design-card" data-category="branding">
        <img src="2.png" alt="Branding">
    </div>
    <div class="design-card" data-category="logo branding">
        <img src="3.png" alt="Logo Branding">
    </div>
</div>
    <footer>
        <a href="https://wa.me/94774799172" target="_blank" class="btn wa-btn">Contact Me on WhatsApp</a>
        <br>
        <a href="https://www.canva.com/design/DAHIDk_RyrA/S04Tfyu4wdQsxeNUvZdrdg/view" target="_blank" class="btn canva-btn">Full Canva Portfolio</a>
    </footer>

    <script>
        function filterDesigns() {
            let input = document.getElementById('designSearch').value.toLowerCase();
            let cards = document.getElementsByClassName('design-card');
            for (let i = 0; i < cards.length; i++) {
                let category = cards[i].getAttribute('data-category').toLowerCase();
                if (category.includes(input)) {
                    cards[i].style.display = "block";
                } else {
                    cards[i].style.display = "none";
                }
            }
        }
    </script>

</body>
</html>
