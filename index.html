<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinuri Designs | Premium Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #D4AF37; 
            --black: #050505; 
            --dark-grey: #111;
        }
        
        /* මුළු සයිට් එකම කළු කරන බව සහතිකයි */
        html, body { 
            background-color: var(--black) !important; 
            color: #fff; 
            font-family: 'Montserrat', sans-serif; 
            margin: 0; 
            text-align: center; 
            overflow-x: hidden;
        }

        .container { padding: 60px 20px; }

        /* Golden Animated Logo */
        .logo-container { margin-top: 20px; perspective: 1000px; }
        .logo-ring {
            width: 120px; height: 120px;
            border: 2px solid var(--gold);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 30px auto;
            box-shadow: 0 0 20px rgba(212,175,55,0.2);
            animation: float 4s ease-in-out infinite;
        }
        .brand-logo {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem; font-weight: 700;
            color: var(--gold); letter-spacing: -5px;
            transition: 0.5s; cursor: pointer;
        }
        .brand-logo span { color: #fff; }
        .brand-logo:hover { letter-spacing: 5px; transform: scale(1.1); }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: 3rem; letter-spacing: 8px; color: var(--gold);
            margin: 10px 0; text-transform: uppercase;
        }

        .tagline { color: #666; font-size: 0.8rem; letter-spacing: 4px; margin-bottom: 50px; }

        /* Search Bar */
        .search-box { margin-bottom: 60px; max-width: 500px; margin-left: auto; margin-right: auto; }
        #designSearch {
            width: 90%; padding: 15px 25px; border-radius: 50px; border: 1px solid #333;
            background: var(--dark-grey); color: var(--gold); font-size: 1rem; outline: none; transition: 0.4s;
        }
        #designSearch:focus { border-color: var(--gold); box-shadow: 0 0 15px rgba(212,175,55,0.2); }

        /* Gallery Grid - මෙන්න ඔයාගේ Portfolio එක */
        .gallery { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 30px; max-width: 1200px; margin: 0 auto; padding: 20px;
        }

        .design-card { 
            border-radius: 15px; overflow: hidden; 
            background: #000; border: 1px solid #222; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .design-card img { width: 100%; height: auto; display: block; filter: brightness(0.8); transition: 0.5s; }
        
        .design-card:hover { 
            transform: translateY(-15px); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            border-color: var(--gold);
        }
        .design-card:hover img { filter: brightness(1.1); }

        footer { margin-top: 100px; padding: 80px 20px; border-top: 1px solid #111; background: #030303; }
        .btn { 
            display: inline-block; padding: 18px 45px; border-radius: 50px; 
            text-decoration: none; font-weight: bold; transition: 0.4s; 
            text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px;
        }
        .wa-btn { background: var(--gold); color: #000; }
        .wa-btn:hover { background: #fff; transform: scale(1.05); }

    </style>
</head>
<body>

    <div class="container">
        <div class="logo-container">
            <div class="logo-ring">
                <div class="brand-logo">K<span>M</span></div>
            </div>
        </div>

        <h1>KINURI DESIGNS</h1>
        <p class="tagline">PREMIUM VISUAL SOLUTIONS</p>

        <div class="search-box">
            <input type="text" id="designSearch" placeholder="Search my portfolio (Logo, Branding...)" onkeyup="filterDesigns()">
        </div>

        <div class="gallery" id="designGallery">
            <div class="design-card" data-category="logo branding">
                <img src="IMG_2917.jpg" alt="Design 1">
            </div>
            <div class="design-card" data-category="social media branding">
                <img src="IMG_2918.jpg" alt="Design 2">
            </div>
            <div class="design-card" data-category="logo branding">
                <img src="3.jpg.png" alt="Design 3">
            </div>
            </div>
    </div>

    <footer>
        <a href="https://wa.me/94774799172" target="_blank" class="btn wa-btn">Contact on WhatsApp</a>
        <p style="color: #333; font-size: 11px; margin-top: 50px;">&copy; 2026 KINURI DESIGNS</p>
    </footer>

    <script>
        // Search function එකත් වැඩ කරනවා දැන්
        function filterDesigns() {
            let input = document.getElementById('designSearch').value.toLowerCase();
            let cards = document.getElementsByClassName('design-card');
            for (let i = 0; i < cards.length; i++) {
                let category = cards[i].getAttribute('data-category').toLowerCase();
                cards[i].style.display = category.includes(input) ? "block" : "none";
            }
        }
    </script>
</body>
</html>
