<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KME Elite Kingdom | Business & 3D Experiences</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --deep-bg: #050505; }
        
        body { 
            background: radial-gradient(circle at center, #1a1508 0%, #050505 70%, #000 100%);
            color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden;
        }

        /* LUXURY GOLD SCROLLBAR */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { 
            background: linear-gradient(to bottom, #1a1508, var(--gold), #1a1508); 
            border-radius: 10px; 
        }

        .container { padding: 60px 8%; text-align: center; }
        
        .header-title { font-size: 2.8rem; color: var(--gold); letter-spacing: 10px; text-transform: uppercase; font-weight: 300; margin-bottom: 10px; }
        .sub-text { color: #888; font-size: 14px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 50px; }

        .service-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 20px; }
        
        .premium-box { 
            background: rgba(255, 255, 255, 0.02); 
            border: 1px solid rgba(212, 175, 55, 0.15); 
            padding: 35px 25px; border-radius: 20px; backdrop-filter: blur(12px);
            transition: 0.4s all ease; position: relative;
        }

        .premium-box:hover { 
            border-color: var(--gold); 
            transform: translateY(-8px); 
            box-shadow: 0 10px 40px rgba(212, 175, 55, 0.15); 
        }

        .luxury-btn { 
            display: inline-block; background: transparent; color: var(--gold); 
            border: 1px solid var(--gold); padding: 12px 30px; border-radius: 50px; 
            text-transform: uppercase; letter-spacing: 2px; font-size: 10px; 
            text-decoration: none; transition: 0.4s; cursor: pointer; margin-top: 15px;
        }

        .luxury-btn:hover { 
            background: var(--gold); 
            color: #000; 
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.6); 
            transform: scale(1.05);
        }

        .project-img-box { height: 120px; border-radius: 10px; margin: 15px 0; border: 1px solid #222; opacity: 0.8; background-size: cover; background-position: center; }

        .reveal { opacity: 0; transform: translateY(20px); transition: 1s all ease; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        footer { margin-top: 80px; padding-bottom: 40px; color: #444; font-size: 11px; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="header-title reveal">Elite Kingdom</h1>
        <p class="sub-text reveal">Premier Design Studio & Digital Assets</p>

        <div class="service-grid reveal">
            <div class="premium-box">
                <i class="fas fa-crown" style="color:var(--gold); font-size: 25px; margin-bottom: 15px;"></i>
                <h3 style="color: var(--gold); letter-spacing: 2px;">ELITE STUDIO</h3>
                <p style="color: #aaa; font-size: 13px; line-height: 1.6;">Luxury branding systems and professional visual identities.</p>
                <a href="https://wa.me/94774799172?text=Hello%20Kinuri,%20I%20want%20to%20inquire%20about%20Elite%20Studio%20services." class="luxury-btn">Order Branding</a>
            </div>

            <div class="premium-box">

                <h3 style="color: var(--gold); letter-spacing: 2px;">KME VAULT</h3>
                <p style="color: #aaa; font-size: 13px; line-height: 1.6;">
