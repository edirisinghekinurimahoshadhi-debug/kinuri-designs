<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinuri Designs | Portfolio</title>
    <style>
        body { background-color: #000; color: #D4AF37; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; }
        .container { padding: 50px 20px; }
        h1 { font-size: 2.5rem; letter-spacing: 2px; margin-bottom: 30px; }
        .logo { width: 150px; margin-bottom: 20px; border-radius: 50%; border: 2px solid #D4AF37; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: auto; }
        .gallery img { width: 100%; border-radius: 10px; border: 1px solid #333; transition: 0.3s; }
        .gallery img:hover { transform: scale(1.05); border-color: #D4AF37; }
        footer { padding: 60px 20px; background: #0a0a0a; border-top: 1px solid #222; margin-top: 50px; }
        .btn { display: inline-block; padding: 15px 35px; margin: 10px; border-radius: 50px; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .btn-outline { border: 2px solid #D4AF37; color: #D4AF37; }
        .btn-outline:hover { background: #D4AF37; color: #000; }
        .btn-fill { background: #D4AF37; color: #000; }
        .btn-fill:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <div class="container">
        <img src="KME.png" alt="Kinuri Designs Logo" class="logo">
        <h1>KINURI DESIGNS</h1>
        <p>Creating elegant designs that speak for your brand.</p>

        <div class="gallery">
            <img src="1.jpg.png" alt="Design 1">
            <img src="2.jpg" alt="Design 2">
            <img src="3.png" alt="Design 3">
        </div>
    </div>

    <footer>
        <p style="color: #fff;">Let's make something amazing together!</p>
        
        <a href="https://kinuri-portfolio.my.canva.site/" target="_blank" class="btn btn-outline">
            View My Canva Portfolio
        </a>

        <br>

        <a href="https://wa.me/94774799172" target="_blank" class="btn btn-fill">
            Message on WhatsApp
        </a>

        <p style="color: #555; font-size: 12px; margin-top: 30px;">&copy; 2026 Kinuri Designs. All Rights Reserved.</p>
    </footer>

</body>
</html>
