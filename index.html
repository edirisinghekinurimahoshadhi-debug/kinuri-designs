<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KME Premium</title>
    <style>
        body {
            margin: 0;
            background-color: #0a0a0a;
            color: #D4AF37;
            font-family: 'Georgia', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .card-container {
            cursor: pointer;
            transition: transform 0.3s;
            border: 1px solid #D4AF37;
            padding: 5px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        img {
            width: 320px;
            display: block;
            border-radius: 8px;
        }

        button {
            margin-top: 30px;
            background: transparent;
            color: #D4AF37;
            border: 1px solid #D4AF37;
            padding: 10px 25px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        button:hover {
            background: #D4AF37;
            color: black;
        }
    </style>
</head>
<body>

    <div class="card-container">
        <img src="1.jpg.png" alt="KME Design">
    </div>

    <button onclick="playBrand()">Experience KME</button>

    <audio id="music" src="monume-luxury-509454.mp3" loop></audio>
    <audio id="voice" src="mp3-output-ttsfree(dot)com.mp3"></audio>

    <script>
        function playBrand() {
            var music = document.getElementById('music');
            var voice = document.getElementById('voice');
            
            music.volume = 0.3;
            music.play();
            
            setTimeout(function() {
                voice.play();
            }, 1000);
        }
    </script>

</body>
</html>
