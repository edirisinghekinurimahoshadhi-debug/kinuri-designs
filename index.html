<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KME LUXURY DESIGNS</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            background: #000; color: #D4AF37;
            font-family: 'Playfair Display', serif;
            text-align: center; scroll-behavior: smooth;
        }

        /* Golden Dust Canvas */
        #dustCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        /* Header Section (Logo Middle & Top) */
        .header { padding-top: 40px; margin-bottom: 20px; }
        .header img { width: 120px; filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.5)); }
        .brand-name { font-size: 24px; letter-spacing: 5px; font-weight: bold; margin-top: 10px; }

        /* Luxury Search Box */
        .search-container { margin: 20px auto; width: 80%; max-width: 400px; }
        #designSearch {
            width: 100%; padding: 12px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 50px; color: #D4AF37;
            outline: none; font-family: inherit;
            transition: 0.3s; text-align: center;
        }
        #designSearch:focus { border-color: #D4AF37; box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }

        /* Gallery */
        .gallery { display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 20px; }
        .card {
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 8px; border-radius: 15px; background: rgba(5, 5, 5, 0.8);
            max-width: 330px; width: 90%; transition: 0.4s;
        }
        .card img { width: 100%; border-radius: 10px; display: block; }
        
        /* Hidden class for search */
        .hide { display: none; }

        .lux-btn {
            width: 260px; background: transparent; color: #D4AF37;
            border: 1px solid #D4AF37; padding: 14px;
            margin: 10px 0; text-transform: uppercase;
            letter-spacing: 3px; border-radius: 50px; cursor: pointer;
        }
    </style>
</head>
<body>

    <canvas id="dustCanvas"></canvas>

    <div class="header">
        <img src="logo-animated.gif.gif" alt="KME Logo">
        <div class="brand-name">KME LUXURY DESIGNS</div>
    </div>

    <div class="search-container">
        <input type="text" id="designSearch" placeholder="Search Designs (e.g. Logo, Brand...)" onkeyup="filterDesigns()">
    </div>

    <div class="gallery" id="gallery">
        <div class="card" data-tag="logo design luxury gold"><img src="1.jpg.png"></div>
        <div class="card" data-tag="brand identity social media"><img src="2.png"></div>
        <div class="card" data-tag="creative graphic art"><img src="3.png"></div>
    </div>

    <button class="lux-btn" onclick="startExperience()">Experience KME</button>
    <a href="https://canva.link/zbwo5ma56hbqnuz" target="_blank" class="lux-btn" style="text-decoration:none; display:inline-block;">Canva Portfolio</a>

    <audio id="voice" src="mp3-output-ttsfree(dot)com.mp3"></audio>
    <audio id="bgMusic" src="monume-luxury-509454.mp3" loop></audio>

    <script>
        // Search Filter Magic
        function filterDesigns() {
            let input = document.getElementById('designSearch').value.toLowerCase();
            let cards = document.getElementsByClassName('card');

            for (let i = 0; i < cards.length; i++) {
                let tags = cards[i].getAttribute('data-tag').toLowerCase();
                if (tags.includes(input)) {
                    cards[i].classList.remove('hide');
                } else {
                    cards[i].classList.add('hide');
                }
            }
        }

        // Particle System (Dust)
        const canvas = document.getElementById('dustCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speedX = Math.random() * 0.4 - 0.2;
                this.speedY = Math.random() * 0.4 - 0.2;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0; if (this.y > canvas.height) this.y = 0;
            }
            draw() {
                ctx.fillStyle = 'rgba(212, 175, 55, 0.4)';
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }
        for (let i = 0; i < 80; i++) { particles.push(new Particle()); }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        function startExperience() {
            document.getElementById('voice').play();
            const m = document.getElementById('bgMusic'); m.volume = 0.2; m.play();
        }
    </script>
</body>
</html>
