<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KME LUXURY DESIGNS | Visionary Portfolio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap');

        body, html {
            margin: 0; padding: 0;
            background: #000; color: #D4AF37;
            font-family: 'Playfair Display', serif;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        #dustCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.6; pointer-events: none; }

        /* Navigation */
        nav {
            background: rgba(0, 0, 0, 0.9);
            padding: 20px 60px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            backdrop-filter: blur(10px);
        }

        .menu-links { display: flex; gap: 35px; }
        .menu-links a { 
            color: #D4AF37; text-decoration: none; font-size: 12px; 
            text-transform: uppercase; letter-spacing: 3px; transition: 0.4s;
            font-family: 'Inter', sans-serif; font-weight: 600;
        }
        .menu-links a:hover { color: #fff; text-shadow: 0 0 10px #D4AF37; }

        .search-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: #fff; padding: 10px 25px; border-radius: 30px;
            outline: none; width: 200px; transition: 0.4s;
        }
        .search-box:focus { width: 300px; border-color: #D4AF37; }

        /* Header */
        .header { padding: 120px 20px; text-align: center; }
        .header img { width: 140px; filter: drop-shadow(0 0 20px #D4AF37); margin-bottom: 30px; }
        .brand-name { font-size: 45px; letter-spacing: 15px; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; }
        .tagline { font-family: 'Inter', sans-serif; font-size: 12px; letter-spacing: 6px; color: #888; text-transform: uppercase; }

        /* Audio Controls */
        .audio-toggle {
            position: fixed; bottom: 30px; left: 30px;
            background: rgba(212, 175, 55, 0.1); border: 1px solid #D4AF37;
            color: #D4AF37; padding: 15px; border-radius: 50%;
            cursor: pointer; z-index: 1000; transition: 0.3s;
        }
        .audio-toggle:hover { background: #D4AF37; color: #000; }

        /* Portfolio Cards */
        .gallery { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 50px; padding: 80px 60px; max-width: 1300px; margin: 0 auto; 
        }
        .card { border: 1px solid rgba(212, 175, 55, 0.1); background: #080808; border-radius: 5px; overflow: hidden; transition: 0.5s; }
        .card:hover { transform: translateY(-10px); border-color: #D4AF37; box-shadow: 0 10px 40px rgba(212, 175, 55, 0.1); }
        .card video, .card img { width: 100%; display: block; object-fit: cover; height: 300px; }
        .card-info { padding: 30px; text-align: left; }
        .card-title { font-size: 20px; letter-spacing: 4px; margin-bottom: 12px; }
        .card-desc { font-family: 'Inter', sans-serif; color: #777; font-size: 14px; line-height: 1.6; }

        /* Feedback Section */
        .feedback-section { padding: 120px 20px; text-align: center; background: #050505; }
        .feedback-container { max-width: 600px; margin: 40px auto; }
        .feedback-input {
            width: 100%; padding: 20px; margin: 15px 0; background: #111;
            border: 1px solid rgba(212, 175, 55, 0.2); color: #fff; border-radius: 5px;
            outline: none; font-family: 'Inter', sans-serif;
        }
        .cta-btn {
            background: #D4AF37; color: #000; border: none; padding: 20px 50px;
            border-radius: 50px; cursor: pointer; font-weight: bold;
            text-transform: uppercase; letter-spacing: 3px; font-size: 13px; transition: 0.4s;
        }
        .cta-btn:hover { background: #fff; transform: scale(1.05); }

        .footer { padding: 60px; text-align: center; font-size: 10px; color: #444; letter-spacing: 4px; border-top: 1px solid rgba(212, 175, 55, 0.1); }
    </style>
</head>
<body>

    <canvas id="dustCanvas"></canvas>

    <nav>
        <div class="menu-links">
            <a href="#home">Philosophy</a>
            <a href="#gallery">Portfolio</a>
            <a href="https://canva.link/zbwo5ma56hbqnuz" target="_blank" style="border: 1px solid #D4AF37; padding: 8px 15px;">Canva Studio</a>
            <a href="#feedback">Connect</a>
        </div>
        <input type="text" class="search-box" placeholder="Explore creations...">
    </nav>
