<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KME Elite Kingdom | Luxury Experience</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --black: #050505; --purple: #a855f7; --aqua: #00ff88; }

        body { 
            background: radial-gradient(circle at center, #1a1508 0%, #050505 70%, #000 100%);
            color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; overflow-x: hidden;
        }

        #dust-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        .reveal { opacity: 0; transform: translateY(30px); transition: all 1.2s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* ELITE TITLE DESIGN */
        .elite-header { padding: 100px 10% 50px 10%; }
        .elite-title { font-size: 3.5rem; letter-spacing: 20px; font-weight: 100; color: #fff; text-shadow: 0 0 20px rgba(212,175,55,0.5); margin: 0; }
        .elite-sub { font-size: 1rem; letter-spacing: 10px; color: var(--gold); margin-top: -10px; font-weight: 300; }

        /* PROJECT HUB CARDS */
        .hub-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; padding: 0 8%; margin-top: 50px; }
        
        .hub-card { 
            position: relative; height: 400px; border-radius: 30px; overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.1); transition: 0.6s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            cursor: pointer; background-size: cover; background-position: center;
        }

        .hub-card:hover { transform: scale(1.02); border-color: var(--gold); box-shadow: 0 0 50px rgba(212,175,55,0.2); }

        .hub-overlay { 
            position: absolute; bottom: 0; left: 0; width: 100%; padding: 40px 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9)); text-align: center;
        }

        .hub-card h3 { letter-spacing: 5px; font-weight: 300; margin: 0; font-size: 1.5rem; }
        .hub-card p { font-size: 11px; color: #aaa; letter-spacing: 2px; text-transform: uppercase; margin-top: 10px; }

        /* SPECIAL EFFECTS */
        .effect-layer { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 10000; display: none; }

        .luxury-btn {
            display: inline-block; background: transparent; color: var(--gold);
            border: 1px solid var(--gold); padding: 12px 35px; font-size: 11px;
            text-transform: uppercase; letter-spacing: 3px; text-decoration: none;
            border-radius: 50px; transition: 0.4s; cursor: pointer; margin-top: 20px;
        }
        .luxury-btn:hover { background: var(--gold); color: #000; box-shadow: 0 0 25px var(--gold); }

        footer { padding: 60px; color: #444; font-size: 11px; letter-spacing: 2px; }

    </style>
</head>
<body>

    <canvas id="dust-canvas"></canvas>
    <div id="magic-effect" class="effect-layer"></div>

    <header class="elite-header reveal">
        <h1 class="elite-title">ELITE</h1>
        <h2 class="elite-sub">KINGDOM</h2>
        <div style="width:60px; height:2px; background:var(--gold); margin: 30px auto;"></div>
    </header>

    <section class="reveal">
        <div class="hub-grid">
            <div class="hub-card" style="background-image: url('https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&q=80&w=800');" onclick="triggerMagic('gaming')">
                <div class="hub-overlay">
                    <h3 style="color: var(--purple);">GAMING HUB</h3>
                    <p>Enter the Arcade Multiverse</p>
                    <button class="luxury-btn">Launch Hub</button>
                </div>
            </div>

            <div class="hub-card" style="background-image: url('https://images.unsplash.com/photo-1518709268805-4e9042af9f23?auto=format&fit=crop&q=80&w=800');" onclick="triggerMagic('fantasy')">
                <div class="hub-overlay">
                    <h3 style="color: var(--gold);">FANTASY WORLD</h3>
                    <p>Cinematic Design Storytelling</p>
                    <button class="luxury-btn">Explore</button>
                </div>
            </div>

            <div class="hub-card" style="background-image: url('Gemini_Generated_Image_zc8ozgzc8ozgzc8o.png');" onclick="triggerMagic('aqua')">
                <div class="hub-overlay">
                    <h3 style="color: var(--aqua);">AQUA LEAF</h3>
                    <p>Luxury Organic Branding</p>
                    <button class="luxury-btn">View Assets</button>
                </div>
            </div>
        </div>
    </section>

    <footer class="reveal">
        <p>KINURI EDIRISINGHE | CERTIFIED DESIGNER</p>
        <div style="margin-top: 20px;">
            <a href="https://wa.me/94774799172" style="color:var(--gold); text-decoration:none; margin:0 15px;">WHATSAPP</a>
            <a href="https://whatsapp.com/channel/0029VbAND0eFi8xmLegMVO2j" style="color:var(--gold); text-decoration:none; margin:0 15px;">CHANNEL</a>
        </div>
        <p style="margin-top:40px; opacity:0.3;">© 2026 KME ELITE KINGDOM</p>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            document.querySelectorAll('.reveal').forEach(el => el.classList.add('active'));
        });

        // MAGIC DUST TRIGGER FOR HUB CLICK
        function triggerMagic(type) {
            const effect = document.getElementById('magic-effect');
            effect.style.display = 'block';
            
            let color = type === 'gaming' ? '#a855f7' : (type === 'aqua' ? '#00ff88' : '#D4AF37');
            
            // Create particles
            for(let i=0; i<50; i++) {
                let p = document.createElement('div');
                p.style.position = 'fixed';
                p.style.left = '50%';
                p.style.top = '50%';
                p.style.width = '4px';
                p.style.height = '4px';
                p.style.background = color;
                p.style.borderRadius = '50%';
                p.style.boxShadow = `0 0 15px ${color}`;
                p.style.zIndex = '10001';
                
                let angle = Math.random() * Math.PI * 2;
                let velocity = 5 + Math.random() * 10;
                let dx = Math.cos(angle) * velocity;
                let dy = Math.sin(angle) * velocity;
                
                document.body.appendChild(p);
                
                let op = 1;
                let anim = setInterval(() => {
                    p.style.left = (parseFloat(p.style.left) + dx) + 'px';
                    p.style.top = (parseFloat(p.style.top) + dy) + 'px';
                    op -= 0.02;
                    p.style.opacity = op;
                    if(op <= 0) {
                        clearInterval(anim);
                        p.remove();
                    }
                }, 16);
            }

            setTimeout(() => {
                window.location.href = "subscription.html"; 
            }, 1000);
        }

        // BACKGROUND DUST
        const canvas = document.getElementById('dust-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        for(let i=0; i<60; i++) particles.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, size:Math.random()*1.5, speed:Math.random()*0.4, opacity:Math.random()});
        function animateDust() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                ctx.fillStyle = `rgba(212, 175, 55, ${p.opacity})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
                p.y -= p.speed; if(p.y < 0) p.y = canvas.height;
            });
            requestAnimationFrame(animateDust);
        }
        animateDust();
    </script>
</body>
</html>
