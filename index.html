<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinuri Designs</title>
    <style>
       <style>
    body { 
        background-color: #000; 
        color: #D4AF37; 
        font-family: 'Poppins', sans-serif; 
        margin: 0; 
        text-align: center; 
        scroll-behavior: smooth;
    }
    .container { padding: 80px 20px; }
    
    /* Logo Animation */
    .logo { 
        width: 130px; 
        border-radius: 50%; 
        border: 2px solid #D4AF37; 
        margin-bottom: 20px; 
        transition: transform 0.5s ease;
    }
    .logo:hover { transform: rotate(360px); }

    h1 { 
        font-size: 3rem; 
        letter-spacing: 5px; 
        margin-bottom: 10px; 
        text-transform: uppercase;
        animation: fadeIn 2s;
    }

    /* Gallery Image Effects */
    .gallery { 
        display: flex; 
        flex-wrap: wrap; 
        justify-content: center; 
        gap: 25px; 
        padding: 40px 20px; 
    }
    .gallery img { 
        width: 320px; 
        border-radius: 15px; 
        border: 1px solid #222; 
        transition: all 0.4s ease;
        filter: grayscale(30%);
    }
    .gallery img:hover { 
        transform: scale(1.08) translateY(-10px); 
        border-color: #D4AF37; 
        filter: grayscale(0%);
        box-shadow: 0 10px 30px rgba(212, 175, 55, 0.2);
    }

    /* Modern Footer & Buttons */
    footer { 
        background: linear-gradient(to bottom, #000, #0a0a0a); 
        padding: 80px 20px; 
        margin-top: 50px; 
        border-top: 1px solid #1a1a1a; 
    }
    .btn { 
        display: inline-block; 
        padding: 16px 40px; 
        margin: 12px; 
        border-radius: 50px; 
        text-decoration: none; 
        font-weight: bold; 
        font-size: 1rem; 
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 1px;
    }
    .canva-btn { 
        border: 2px solid #D4AF37; 
        color: #D4AF37; 
    }
    .canva-btn:hover { 
        background: #D4AF37; 
        color: #000; 
        box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
    }
    .wa-btn { 
        background: #D4AF37; 
        color: #000; 
        box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
    }
    .wa-btn:hover { 
        transform: scale(1.05);
        box-shadow: 0 0 25px rgba(212, 175, 55, 0.5);
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }
</style>
        
        <div class="gallery">
            <img src="1.jpg.png">
            <img src="2.png">
            <img src="3.png">
        </div>
    </div>

           target="_blank" class="btn canva-btn">

</body>
