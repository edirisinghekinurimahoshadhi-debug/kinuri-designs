<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KME Luxury Designs</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --black: #050505; }
        body { 
            background: radial-gradient(circle at center, #1a1508 0%, #050505 70%, #000 100%);
            color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; overflow-x: hidden;
        }
        #dust-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .reveal { opacity: 0; transform: translateY(30px); transition: all 1s; }
        .reveal.active { opacity: 1; transform: translateY(0); }
        .logo-container { margin: 50px auto; width: 150px; }
        .logo-container img { width: 100%; filter: drop-shadow(0 0 15px var(--gold)); }
        .brand-name { font-size: 1.8rem; color: var(--gold); letter-spacing: 5px; }
        section { padding: 50px 10%; border-bottom: 1px solid rgba(212, 175, 55, 0.1); }
        .content-box { max-width: 600px; margin: 0 auto; border: 1px solid var(--gold); padding: 25px; border-radius: 15px; background: rgba(0,0,0,0.3); }
        .luxury-btn { display: inline-block; border: 1px solid var(--gold); color: var(--gold); padding: 10px 25px; text-decoration: none; border-radius: 25px; cursor: pointer; margin: 10px; background: transparent; transition: 0.3s; }
        .luxury-btn:hover { background: var(--gold); color: #000; }
        #game-canvas { width: 100%; height: 300px; background: #0a0a0a; border: 1px solid var(--gold); position: relative; overflow: hidden; border-radius: 10px; margin-top: 20px; }
    </style>
</head>
<body>
    <canvas id="dust-canvas"></canvas>
    
    <div class="logo-container reveal active">
        <img src="logo-animated.gif" alt="KME Logo">
    </div>
    <h1 class="brand-name reveal active">KME LUXURY DESIGNS</h1>

    <section id="game-zone" class="reveal active">
        <h2 style="color: var(--gold);">THE LUXURY QUEST</h2>
        <div id="game-container" class="content-box">
            <p>Ready to discover your brand's future?</p>
            <button class="luxury-btn" onclick="startQuiz()">Start Quiz</button>
        </div>
    </section>

    <section id="mini-game" class="reveal active">
        <h3 style="color: var(--gold);">GOLDEN LEAF CATCHER</h3>
        <div id="game-canvas">
            <div id="score" style="position: absolute; top: 10px; left: 10px; color: var(--gold); z-index: 5;">Level: 1 | Score: 0/10</div>
        </div>
        <button class="luxury-btn" onclick="startCatchGame()">Play Now</button>
        <div onclick="askForMoreGames()" style="cursor:pointer; margin-top:15px;">🔑 <span style="color:var(--gold); font-size:12px;">Unlock Pro</span></div>
    </section>

    <script>
        // Particle Background
        const canvasD = document.getElementById('dust-canvas');
        const ctxD = canvasD.getContext('2d');
        function res() { canvasD.width = window.innerWidth; canvasD.height = window.innerHeight; }
        window.onresize = res; res();
        let pts = [];
        for(let i=0; i<50; i++) pts.push({x:Math.random()*canvasD.width, y:Math.random()*canvasD.height, s:Math.random()*1, sp:Math.random()*0.5});
        function anim() {
            ctxD.clearRect(0,0,canvasD.width,canvasD.height);
            pts.forEach(p => {
                ctxD.fillStyle = "rgba(212,175,55,0.3)";
                ctxD.beginPath(); ctxD.arc(p.x, p.y, p.s, 0, 7); ctxD.fill();
                p.y -= p.sp; if(p.y<0) p.y=canvasD.height;
            });
            requestAnimationFrame(anim);
        }
        anim();

        // Quiz
        function startQuiz() {
            document.getElementById('game-container').innerHTML = `
                <p>Pick your Style:</p>
                <button class="luxury-btn" onclick="revealP('10% Off')">Gold</button>
                <button class="luxury-btn" onclick="revealP('Free Audit')">Silver</button>`;
        }
        function revealP(p) {
            document.getElementById('game-container').innerHTML = `<h3 style="color:gold">${p} Won!</h3>`;
        }

        // Game Catch
        let score = 0; let gActive = false; let lvl = 1;
        function startCatchGame() {
            if(gActive) return; gActive = true; score = 0; lvl = 1;
            runLoop();
        }
        function runLoop() {
            let loop = setInterval(() => {
                if(!gActive) { clearInterval(loop); return; }
                if(score>=10) { 
                    if(lvl<3) { lvl++; score=0; alert("Level Up!"); }
                    else { gActive=false; revealKey(); clearInterval(loop); return; }
                }
                createL();
            }, 1000);
        }
        function createL() {
            const cvs = document.getElementById('game-canvas');
            const leaf = document.createElement('div');
            const bad = Math.random() < 0.2;
            leaf.innerHTML = bad ? "🍂" : "🍃";
            leaf.style.cssText = `position:absolute; left:${Math.random()*(cvs.offsetWidth-40)}px; top:-40px; font-size:40px; cursor:pointer; transition:top 3s linear;`;
            if(bad) leaf.style.filter = "sepia(1) saturate(5) hue-rotate(-50deg)";
            cvs.appendChild(leaf);
            setTimeout(() => leaf.style.top = "310px", 50);
            leaf.onclick = () => { if(bad) score-=2; else score++; document.getElementById('score').innerText = `Level: ${lvl} | Score: ${score}/10`; leaf.remove(); };
            setTimeout(() => { if(leaf.parentNode) leaf.remove(); }, 3000);
        }
        function revealKey() {
            document.getElementById('game-canvas').innerHTML = `<div style="margin-top:100px; color:gold;" onclick="askForMoreGames()"><h2>DONE!</h2><div style="font-size:50px; cursor:pointer;">🔑</div></div>`;
        }
        function askForMoreGames() {
            document.getElementById('game-canvas').innerHTML = `<div style="margin-top:80px;"><h3>Go Pro?</h3><button class="luxury-btn" onclick="window.location.href='subscription.html'">YES</button><button class="luxury-btn" onclick="location.reload()">NO</button></div>`;
        }
    </script>
</body>
</html>
