<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KME | LUXURY DESIGNS</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            color: #D4AF37;
            font-family: 'Georgia', serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
            scroll-behavior: smooth;
        }

        /* 1. Logo & Glowing Text Section */
        .header-section {
            text-align: center;
            margin-top: 40px;
            margin-bottom: 30px;
        }

        .header-section img {
            width: 100px;
            margin-bottom: 15px;
        }

        .brand-name {
            font-size: 22px;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-weight: bold;
            /* දිලිසෙන ඉෆෙක්ට් එක (Glowing Effect) */
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.8), 0 0 20px rgba(212, 175, 55, 0.5);
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #D4AF37; }
            to { text-shadow: 0 0 25px #D4AF37, 0 0 10px #fff; }
        }

        /* 2. Portfolio Gallery (Horizontal on Desktop, Vertical on Mobile) */
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            padding: 20px;
            width: 95%;
        }

        .card-frame {
            border: 1px solid rgba(212, 175, 55, 0.3);
            padding: 5px;
            border-radius: 10px;
            background: #0a0a0a;
            max-width: 320px; /* රූප එක ළඟ තිබිය හැකි ප්‍රමාණය */
            transition: 0.4s;
        }

        .card-frame:hover {
            transform: scale(1.03);
            border-color: #D4AF37;
        }

        img.design-img {
            width: 100%;
            border-radius: 8px;
            display: block;
        }

        /* 3. Buttons Section */
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 30px 0;
            width: 280px;
        }

        .luxury-btn {
            background: transparent; color: #D4AF37;
            border: 1px solid #D4AF37; padding: 12px;
            text-transform: uppercase; letter-spacing: 2px;
            text-decoration: none; font-size: 11px;
            border-radius: 50px; transition: 0.4s;
            text-align: center; cursor: pointer;
        }

        .luxury-btn:hover { background: #D4AF37; color: #000; }

    </style>
</head>
<body onclick="startExperience()">

    <div class="header-section">
        <img src="logo-animated.gif.gif" alt="KME Logo">
        <div class="brand-name">KME - LUXURY DESIGNS</div>
    </div>

    <div class="gallery">
        <div class="card-frame"><img src="1.jpg.png" class="design-img"></div>
        <div class="card-frame"><img src="2.png" class="design-img"></div>
        <div class="card-frame"><img src="3.png" class="design-img"></div>
    </div>

    <div class="btn-container">
        <a href="ඔයාගේ_කැන්වා_Portfolio_Link_එක" target="_blank" class="luxury-btn">Full Portfolio (Canva)</a>
        <a href="https://wa.me/947XXXXXXXX" target="_blank" class="luxury-btn">Contact Me</a>
        <button class="luxury-btn" onclick="toggleMusic(event)">Music ON/OFF 🎷</button>
    </div>

    <audio id="voiceAudio" src="mp3-output-ttsfree(dot)com.mp3"></audio>
    <audio id="bgMusic" src="monume-luxury-509454.mp3" loop></audio>

    <script>
        let experienceStarted = false;

        function startExperience() {
            if (!experienceStarted) {
                document.getElementById('voiceAudio').play();
                experienceStarted = true;
            }
        }

        function toggleMusic(event) {
            event.stopPropagation();
            const music = document.getElementById('bgMusic');
            if (music.paused) {
                music.volume = 0.2;
                music.play();
            } else {
                music.pause();
            }
        }
    </script>
</body>
</html>
