<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KME LUXURY DESIGNS</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #D4AF37;
            font-family: 'Playfair Display', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .header img {
            width: 120px;
            margin-bottom: 10px;
        }

        .brand-name {
            font-size: 24px;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 40px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        /* Golden Glowing Buttons */
        .lux-btn {
            width: 280px;
            background: transparent;
            color: #D4AF37;
            border: 1px solid #D4AF37;
            padding: 15px;
            margin: 10px 0;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 13px;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-block;
            outline: none;
        }

        /* බටන් එක ක්ලික් කරනකොට දිලිසෙන Magic එක */
        .lux-btn:active {
            background: #D4AF37;
            color: #000;
            box-shadow: 0 0 30px #D4AF37, 0 0 50px #D4AF37;
            transform: scale(0.96);
        }

        /* Hover කරනකොට පොඩි Glow එකක් */
        .lux-btn:hover {
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo-animated.gif.gif" alt="KME Logo">
        <div class="brand-name">KME LUXURY DESIGNS</div>
    </div>

    <button class="lux-btn" onclick="startExperience()">Experience KME</button>

    <a href="https://canva.link/zbwo5ma56hbqnuz" target="_blank" class="lux-btn">View Portfolio</a>
    <a href="https://wa.me/94760517560" target="_blank" class="lux-btn">Contact Me</a>

    <audio id="voice" src="mp3-output-ttsfree(dot)com.mp3"></audio>
    <audio id="bgMusic" src="monume-luxury-509454.mp3" loop></audio>

    <script>
        function startExperience() {
            var voiceAudio = document.getElementById('voice');
            var bgMusic = document.getElementById('bgMusic');

            // සයිට් එකේදිම ප්ලේ වෙන්න මෙහෙම කරමු
            voiceAudio.play();
            
            bgMusic.volume = 0.2;
            bgMusic.play();
        }
    </script>

</body>
</html>
