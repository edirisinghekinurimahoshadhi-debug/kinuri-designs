<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KME Fairy World | Triple Experience</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --blood: #800000; --fairy: #ffb6c1; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }

        /* PORTAL & CHOICE */
        #portal-stage {
            height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle, #1a0033, #000); position: relative; transition: 1s;
        }
        .road {
            width: 200px; height: 100%; background: linear-gradient(to top, var(--gold) 0%, transparent 100%);
            position: absolute; bottom: 0; clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
            opacity: 0.2; animation: flow 2s linear infinite;
        }
        @keyframes flow { from { transform: translateY(0); } to { transform: translateY(20px); } }

        #fairy-world { display: none; padding: 40px 5%; animation: fadeIn 2s; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; margin-top: 30px; }
        .box { background: rgba(255,255,255,0.03); border: 1.5px solid var(--gold); padding: 25px; border-radius: 20px; }

        /* GRANNY REMAKE STYLE */
        #granny-zone { width: 100%; height: 300px; background: #050000; position: relative; overflow: hidden; border-radius: 10px; border: 1px solid #500; cursor: crosshair; }
        #light-overlay { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.98); pointer-events: none; z-index: 10; }

        .luxury-btn { 
            background: transparent; color: var(--gold); border: 1px solid var(--gold); 
            padding: 12px 25px; border-radius: 50px; cursor: pointer; text-transform: uppercase; 
            margin: 10px; font-size: 11px; transition: 0.4s;
        }
        .luxury-btn:hover { background: var(--gold); color: #000; box-shadow: 0 0 20px var(--gold); }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="portal-stage">
        <div class="road"></div>
        <h1 style="color: var(--gold); letter-spacing: 10px; z-index: 1;">ELITE KINGDOM</h1>
        <p style="z-index: 1; color: #888; font-style: italic; margin-bottom: 30px;">What is your dream game world?</p>
        
        <div style="z-index: 1; display: flex; flex-direction: column; gap: 10px; width: 250px;">
            <button class="luxury-btn" onclick="setWorld('fairy')">✨ Fairy World</button>
            <button class="luxury-btn" onclick="setWorld('horror')" style="border-color: #800; color: #ff4d4d;">🏚️ Horror World</button>
            <button class="luxury-btn" onclick="setWorld('luxury')" style="border-color: #D4AF37;">💎 Luxury World</button>
        </div>
    </div>

    <div id="fairy-world">
        <h1 id="world-title" style="letter-spacing: 5px;">WELCOME</h1>
        <div id="dynamic-content" class="grid"></div>
        <br><br>
        <button class="luxury-btn" onclick="location.reload()">← Back to Selection</button>
    </div>

    <script>
        function setWorld(choice) {
            const portal = document.getElementById('portal-stage');
            const world = document.getElementById('fairy-world');
            const title = document.getElementById('world-title');
            const content = document.getElementById('dynamic-content');

            portal.style.opacity = '0';
            
            setTimeout(() => {
                portal.style.display = 'none';
                world.style.display = 'block';
                
                if (choice === 'fairy') {
                    title.innerText = "✨ MAGIC FAIRY LAND";
                    title.style.color = "#ffb6c1";
                    content.innerHTML = `
                        <div class="box">
                            <h4>🍭 CANDY TAP</h4>
                            <div id="c-score" style="color:var(--fairy)">Score: 0</div>
                            <div id="candy-board" style="display:grid; grid-template-columns:repeat(4,1fr); gap:5px; width:180px; margin:15px auto;"></div>
                            <button class="luxury-btn" onclick="initCandy()">Play</button>
                        </div>
                        <div class="box"><h4>🧚 FAIRY DUST</h4><p>Collect magic particles coming soon!</p></div>
                    `;
                    initCandy();
                } 
                else if (choice === 'horror') {
                    title.innerText = "🏚️ THE HORROR MANSION";
                    title.style.color = "#ff4d4d";
                    content.innerHTML = `
                        <div class="box" style="border-color:#500;">
                            <h4>👵 GRANNY: THE ESCAPE</h4>
                            <div id="granny-zone">
                                <div id="light-overlay"></div>
                                <img id="g-img" src="https://i.imgur.com/vHInXF6.png" style="position:absolute; width:150px; bottom:-250px; left:50%; transform:translateX(-50%); transition:0.2s;">
                                <p id="h-status" style="position:absolute; bottom:5px; width:100%; color:#600; font-size:10px; z-index:15;">Shhh... search for the key.</p>
                            </div>
                            <button class="luxury-btn" onclick="searchRoom()">Search 🔍</button>
                            <button class="luxury-btn" onclick="hideMe()">Hide 🛏️</button>
                        </div>
                    `;
                    initHorror();
                } 
                else if (choice === 'luxury') {
                    title.innerText = "💎 THE GOLDEN VAULT";
                    title.style.color = "#D4AF37";
                    content.innerHTML = `
                        <div class="box"><h4>🏆 ELITE QUIZ</h4><p>Master the art of Luxury Design.</p><button class="luxury-btn">Start Quiz</button></div>
                        <div class="box"><h4>💰 GOLD RUSH</h4><p>Falling gold bars challenge coming soon!</p></div>
                    `;
                }
            }, 800);
        }

        // --- GAME LOGICS ---

        // 1. CANDY GAME
        let score = 0;
        function initCandy() {
            const board = document.getElementById('candy-board');
            if(!board) return;
            board.innerHTML = ''; score = 0;
            for(let i=0; i<12; i++) {
                let c = document.createElement('div');
                c.innerHTML = "🍭"; c.style.cursor="pointer";
                c.onclick = () => { score++; document.getElementById('c-score').innerText = "Score: "+score; c.innerHTML="✨"; };
                board.appendChild(c);
            }
        }

       // 2. HORROR GAME (FIXED VERSION)
        let isHiding = false;
        function initHorror() {
            const zone = document.getElementById('granny-zone');
            const light = document.getElementById('light-overlay');

            // Mouse එකෙන් කරන අයට
            zone.onmousemove = (e) => {
                if(isHiding) return;
                let r = zone.getBoundingClientRect();
                let x = e.clientX - r.left; 
                let y = e.clientY - r.top;
                light.style.background = `radial-gradient(circle at ${x}px ${y}px, transparent 10%, rgba(0,0,0,0.99) 30%)`;
            };

            // ෆෝන් එකෙන් Touch කරන අයට
            zone.ontouchmove = (e) => {
                if(isHiding) return;
                let r = zone.getBoundingClientRect();
                let touch = e.touches[0];
                let x = touch.clientX - r.left; 
                let y = touch.clientY - r.top;
                light.style.background = `radial-gradient(circle at ${x}px ${y}px, transparent 10%, rgba(0,0,0,0.99) 30%)`;
                e.preventDefault(); // Screen එක scroll වෙන එක නවත්තනවා ප්ලේ කරන අතරතුර
            };
        }

        function searchRoom() {
            if(isHiding) return;
            if(Math.random() > 0.8) alert("🔑 Key Found! You Escaped!");
            else if(Math.random() < 0.3) {
                document.getElementById('g-img').style.bottom = "0";
                setTimeout(() => { 
                    if(!isHiding) { alert("👵: I SEE YOU!"); location.reload(); }
                    else document.getElementById('g-img').style.bottom = "-250px";
                }, 600);
            }
        }

        function hideMe() {
            isHiding = true;
            document.getElementById('light-overlay').style.background = "#000";
            setTimeout(() => { 
                isHiding = false; 
                document.getElementById('light-overlay').style.background = "rgba(0,0,0,0.98)";
            }, 3000);
        }
    </script>
</body>
</html>
