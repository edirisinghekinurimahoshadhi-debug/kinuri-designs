<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinuri Designs | Luxury Animated</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #050505; }
        body { background-color: var(--black) !important; color: #fff; font-family: 'Montserrat', sans-serif; margin: 0; text-align: center; }
        .container { padding: 60px 20px; }

        /* Animated Logo Ring */
        .logo-ring {
            width: 160px; height: 160px;
            border: 2px solid var(--gold);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 30px auto;
            overflow: hidden; /* GIF එක රවුමට කැපෙන්න */
            box-shadow: 0 0 25px rgba(212,175,55,0.3);
            background: #000;
        }

        /* මෙතන තමයි වැදගත්ම කොටස */
        .logo-ring img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }

        h1 { font-family: 'Playfair Display', serif; font-size: 2.8rem; letter-spacing: 8px; color: var(--gold); text-transform: uppercase; margin-bottom: 50px; }

        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; max-width: 1200px; margin: 0 auto; padding: 20px; }
        .design-card { border-radius: 15px; overflow: hidden; background: #000; border: 1px solid #222; transition: 0.5s; }
        .design-card img { width: 100%; display: block; filter: brightness(0.9); }
        .design-card:hover { transform: translateY(-10px); border-color: var(--gold); }

        footer { margin-top: 80px; padding: 60px 20px; border-top: 1px solid #111; }
        .btn { padding: 15px 40px; border-radius: 50px; text-decoration: none; font-weight: bold; display: inline-block; margin: 10px; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }
        .wa-btn { background: var(--gold); color: #000; }
        .canva-btn { border: 1px solid var(--gold); color: var(--gold); }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-ring">
            <img src="logo-animated.gif.gif" alt="Kinuri Designs Animated Logo">
        </div>

        <h1>KINURI DESIGNS</h1>

        <div class="gallery">
            <div class="design-card"><img src="IMG_2917.jpg"></div>
            <div class="design-card"><img src="IMG_2918.jpg"></div>
            <div class="design-card"><img src="3.jpg.png"></div>
        </div>
    </div>

    <footer>
        <a href="https://www.canva.com/design/DAHIDk_RyrA/S04Tfyu4wdQsxeNUvZdrdg/view" target="_blank" class="btn canva-btn">Full Portfolio</a>
        <br>
        <a href="https://wa.me/94774799172" target="_blank" class="btn wa-btn">WhatsApp Me</a>
    </footer>

</body>
</html>
