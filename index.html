<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinuri Designs | Premium Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #050505; --card-bg: #111; }
        
        body { 
            background-color: var(--black) !important; 
            color: #fff; 
            font-family: 'Montserrat', sans-serif; 
            margin: 0; 
            text-align: center; 
            overflow-x: hidden;
        }

        .container { padding: 40px 20px; }

        /* Animated Logo */
        .logo-ring {
            width: 150px; height: 150px;
            border: 2px solid var(--gold);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px auto;
            overflow: hidden; 
            box-shadow: 0 0 25px rgba(212,175,55,0.3);
        }
        .logo-ring img { width: 100%; height: 100%; object-fit: cover; }

        h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; letter-spacing: 8px; color: var(--gold); text-transform: uppercase; margin: 10px 0; }

        /* --- NEW SEARCH BOX --- */
        .search-container { margin: 40px auto; max-width: 450px; position: relative; }
        #designSearch {
            width: 100%; padding: 15px 25px; border-radius: 50px; 
            border: 1px solid #333; background: #111; color: var(--gold);
            font-size: 1rem; outline: none; transition: 0.4s;
            box-sizing: border-box;
        }
        #designSearch:focus { border-color: var(--gold); box-shadow: 0 0 15px rgba(212,175,55,0.2); }

        /* --- GALLERY WITH ANIMATION --- */
        .gallery { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 25px; max-width: 1200px; margin: 0 auto; padding: 20px;
        }

        .design-card { 
            border-radius: 15px; overflow: hidden; background: #000; 
            border: 1px solid #222; transition: 0.6s ease;
            opacity: 0; transform: translateY(30px); /* ආරම්භක ස්වභාවය */
        }

        /* සයිට් එක ලෝඩ් වෙද්දී කාඩ්ස් පෙනෙන විදිහ */
        .design-card.reveal { opacity: 1; transform: translateY(0); }

        .design-card img { width: 100%; height: auto; display: block; filter: brightness(0.8); transition: 0.5s; }
        .design-card:hover { transform: translateY(-10px) scale(1.02); border-color: var(--gold); z-index: 10; }
        .design-card:hover img { filter: brightness(1.1); }

        /* Buttons Section */
        footer { margin-top: 60px; padding: 50px 20px; border-top: 1px solid #111; }
        .btn-group { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        
        .btn { 
            padding: 16px 40px; border-radius: 50px; text-decoration: none; 
            font-weight: bold; transition: 0.3s; text-transform: uppercase; 
            font-size: 0.8rem; letter-spacing: 2px; width: 260px;
        }

        .wa-btn { background: var(--gold); color: #000; }
        .canva-btn { border: 2px solid var(--gold); color: var(--gold); }
        .btn:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(212,175,55,0.3); }

    </style>
</head>
<body>

    <div class="container">
        <div class="logo-ring">
            <img src="logo-animated.gif.gif" alt="Kinuri Designs">
        </div>

        <h1>KINURI DESIGNS</h1>

        <div class="search-container">
            <input type="text" id="designSearch" placeholder="Search my work (e.g. Logo)..." onkeyup="filterDesigns()">
        </div>

        <div class="gallery" id="designGallery">
            <div class="design-card reveal" data-category="logo branding">
                <img src="1.jpg.png">
            </div>
            <div class="design-card reveal" data-category="social media branding">
                <img src="2.png">
            </div>
            <div class="design-card reveal" data-category="logo branding">
                <img src="3.png">
            </div>
        </div>
    </div>

    <footer>
        <div class="btn-group">
            <a href="https://www.canva.com/design/DAHIDk_RyrA/S04Tfyu4wdQsxeNUvZdrdg/view" target="_blank" class="btn canva-btn">Full Canva Portfolio</a>
            <a href="https://wa.me/94774799172" target="_blank" class="btn wa-btn">Contact Me</a>
