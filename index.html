<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KME Elite Kingdom | Luxury Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --silver: #C0C0C0; --diamond: #b9f2ff; --black: #050505; }

        body { 
            background: radial-gradient(circle at center, #1a1508 0%, #050505 70%, #000 100%);
            color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; overflow-x: hidden;
        }

        #dust-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(to bottom, #1a1508, var(--gold), #1a1508); border-radius: 10px; }

        .reveal { opacity: 0; transform: translateY(30px); transition: all 1s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* RIGHT TOOLBAR */
        .right-toolbar { position: fixed; right: 20px; top: 50%; transform: translateY(-50%); z-index: 2000; display: flex; flex-direction: column; gap: 15px; }
        .tool-icon { width: 50px; height: 50px; background: rgba(10,10,10,0.9); border: 1px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--gold); cursor: pointer; transition: 0.3s; }
        .tool-icon:hover { background: var(--gold); color: #000; box-shadow: 0 0 20px var(--gold); }
        
        #google_translate_element { display: none; }

        /* PACKAGES */
        .package-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 0 10%; margin-top: 30px; }
        .pkg-card { padding: 30px; border-radius: 20px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.1); transition: 0.4s; }
        .pkg-silver:hover { box-shadow: 0 0 30px rgba(192,192,192,0.3); border-color: var(--silver); }
        .pkg-gold:hover { box-shadow: 0 0 30px rgba(212,175,55,0.3); border-color: var(--gold); }
        .pkg-diamond:hover { box-shadow: 0 0 30px rgba(185,242,255,0.3); border-color: var(--diamond); }

        .luxury-btn { display: inline-block; background: transparent; color: var(--gold); border: 1px solid var(--gold); padding: 10px 30px; border-radius: 50px; text-decoration: none; transition: 0.4s; cursor: pointer; text-transform: uppercase; font-size: 11px; }
        .luxury-btn:hover { background: var(--gold); color: #000; box-shadow: 0 0 20px var(--gold); }

        /* HUB OVERLAY SYSTEM */
        .hub-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 3000; background: rgba(0,0,0,0.98); display: none; align-items: center; justify-content: center; flex-direction: column; backdrop-filter: blur(15px); }
        .hub-content { width: 90%; max-width: 1000px; height: 85vh; overflow-y: auto; padding: 20px; }
        
        .glow-box { border: 1px solid var(--gold); padding: 20px; border-radius: 15px; background: rgba(212,175,55,0.02); cursor: pointer; transition: 0.3s; margin: 10px; }
        .glow-box:hover { background: rgba(212,175,55,0.1); box-shadow: 0 0 25px var(--gold); }

        .logo-container { margin: 60px auto 20px auto; width: 180px; height: 180px; }
        .logo-container img { width: 100%; filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.4)); animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        footer { padding: 60px; color: #444; font-size: 11px; }
    </style>
</head>
<body>

    <canvas id="dust-canvas"></canvas>

    <div class="right-toolbar">
        <div class="tool-icon" onclick="alert('KME AI: Ready for Launch!')"><i class="fas fa-robot"></i></div>
        <div class="tool-icon" onclick="triggerTranslate()"><i class="fas fa-language"></i></div>
    </div>
    <div id="google_translate_element"></div>

    <div class="logo-container reveal">
        <img src="./logo-animated.gif.gif" alt="KME Logo">
    </div>
    
    <h1 style="color:var(--gold); letter-spacing: 8px; font-weight: 300;" class="reveal">KME LUXURY DESIGNS</h1>

    <section class="reveal" style="padding: 60px 5%;">
        <h2 style="color:var(--gold); letter-spacing: 4px;">DESIGN PACKAGES</h2>
        <div class="package-grid">
            <div class="pkg-card pkg-silver">
                <h3 style="color:var(--silver);">SILVER</h3>
                <p style="font-size: 20px;">LKR 1,500</p>
                <a href="https://wa.me/94774799172" class="luxury-btn">Order</a>
            </div>
            <div class="pkg-card pkg-gold">
                <h3 style="color:var(--gold);">GOLDEN</h3>
                <p style="font-size: 20px;">LKR 5,000</p>
                <a href="https://wa.me/94774799172" class="luxury-btn">Order</a>
            </div>
            <div class="pkg-card pkg-diamond">
                <h3 style="color:var(--diamond);">DIAMOND</h3>
                <p style="font-size: 20px;">LKR 10,000+</p>
                <a href="https://wa.me/94774799172" class="luxury-btn">Order</a>
            </div>
        </div>
    </section>

    <section class="reveal" style="padding: 80px 10%;">
        <div class="glow-box" onclick="openHub('main')" style="padding: 50px;">
            <h3 style="color:var(--gold); letter-spacing: 5px;">OUR MISSIONS</h3>
            <p style="font-style: italic;">"Crafting Extraordinary Digital Experiences"</p>
            <p style="font-size: 10px; color: var(--gold); margin-top: 20px;">CLICK TO ENTER ECOSYSTEM</p>
        </div>
    </section>

    <div id="hub-overlay" class="hub-overlay">
        <button onclick="closeHub()" class="luxury-btn" style="position:absolute; top:20px; right:20px; z-index:4000;">CLOSE</button>
        <div id="hub-dynamic-content" class="hub-content">
            </div>
    </div>

    <footer>
        <a href="https://wa.me/94774799172" class="luxury-btn">Contact Me</a>
        <h3 style="color:var(--gold); margin-top: 20px;">KINURI EDIRISINGHE</h3>
        <p>Certified Graphic Designer</p>
    </footer>

    <script type="text/javascript">
        function googleTranslateElementInit() { new google.translate.TranslateElement({pageLanguage: 'en'}, 'google_translate_element'); }
      function triggerTranslate() {
    var translateCombo = document.querySelector('.goog-te-combo');
    if (translateCombo) {
        // සිංහල (si) සහ English (en) අතර මාරු කරනවා
        if (translateCombo.value === 'si') {
            translateCombo.value = 'en';
        } else {
            translateCombo.value = 'si';
        }
        translateCombo.dispatchEvent(new Event('change'));
    } else {
        console.log("Google Translate is initializing...");
    }
}
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            document.querySelectorAll('.reveal').forEach(el => el.classList.add('active'));
        });

        function openHub(type) {
            const overlay = document.getElementById('hub-overlay');
            const content = document.getElementById('hub-dynamic-content');
            overlay.style.display = 'flex';
            
            if(type === 'main') {
                content.innerHTML = `
                    <h2 style="color:var(--gold); letter-spacing:8px;">ELITE KINGDOM</h2>
                    <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
                        <div class="glow-box" onclick="openHub('studio')"><h4>KME DESIGN STUDIO</h4></div>
                        <div class="glow-box" onclick="openHub('store')"><h4>DIGITAL STORE</h4></div>
                        <div class="glow-box" onclick="openHub('multiverse')"><h4>MULTIVERSE HUB</h4></div>
                        <div class="glow-box" onclick="openHub('aqua')"><h4>PROJECT AQUA LEAF</h4></div>
                    </div>`;
            } else if(type === 'studio') {
                content.innerHTML = `
                    <h2 style="color:var(--gold);">KME DESIGN STUDIO</h2>
                    <div style="display:grid; gap:20px;">
                        <div class="glow-box" onclick="loadGame('https://www.google.com/logos/2010/pacman10-i.html')">PLAY PACMAN</div>
                        <div class="glow-box" onclick="loadGame('https://www.retrogames.cc/embed/40238-super-mario-64-usa.html')">PLAY MARIO 64</div>
                        <button class="luxury-btn" onclick="openHub('main')">BACK</button>
                    </div>`;
            } else if(type === 'store') {
                content.innerHTML = `
                    <h2 style="color:var(--gold);">DIGITAL STORE</h2>
                    <div class="glow-box">
                        <img src="https://i.ibb.co/wrLBb0tv/Screenshot-2026-05-10-190318.png" style="width:100%; border-radius:10px;">
                        <h4>CANVA ELITE PACK 01</h4>
                        <p>LKR 500</p>
                        <a href="https://wa.me/94774799172" class="luxury-btn">Buy Now</a>
                    </div>
                    <button class="luxury-btn" onclick="openHub('main')">BACK</button>`;
            } else if(type === 'multiverse') {
                content.innerHTML = `
                    <h2 style="color:#a855f7;">ELITE MULTIVERSE</h2>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                        <div class="glow-box">MARVEL EDITS</div>
                        <div class="glow-box">POTTERMORE ART</div>
                    </div>
                    <button class="luxury-btn" onclick="openHub('main')">BACK</button>`;
            } else if(type === 'aqua') {
                content.innerHTML = `
                    <h2 style="color:#00ff88;">AQUA LEAF & SPICES</h2>
                    <div class="content-box">
                        <p>This project explores high-end packaging for Sri Lankan spices and organic branding.</p>
                        <p>Premium Ceylon Spices Series (2026)</p>
                    </div>
                    <button class="luxury-btn" onclick="openHub('main')">BACK</button>`;
            }
        }

        function loadGame(url) {
            document.getElementById('hub-dynamic-content').innerHTML = `
                <iframe src="${url}" width="100%" height="70%" style="border:1px solid var(--gold); border-radius:15px;"></iframe>
                <br><button class="luxury-btn" onclick="openHub('studio')">BACK TO STUDIO</button>`;
        }

        function closeHub() { document.getElementById('hub-overlay').style.display = 'none'; }

        // DUST ANIMATION
        const canvas = document.getElementById('dust-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        for(let i=0; i<40; i++) particles.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, size:Math.random()*1.5, speed:Math.random()*0.3, opacity:Math.random()});
        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            particles.forEach(p => {
                ctx.fillStyle = `rgba(212,175,55,${p.opacity})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
                p.y -= p.speed; if(p.y < 0) p.y = canvas.height;
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
