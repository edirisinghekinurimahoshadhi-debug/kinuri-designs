        <style>
    /* Logo Animation Styles */
    .logo-container {
        margin-top: 20px;
        perspective: 1000px; /* 3D ගතියක් දෙන්න */
    }

    .logo { 
        width: 130px; 
        height: 130px;
        border-radius: 50%; 
        border: 2px solid var(--gold); 
        margin-bottom: 20px; 
        object-fit: cover;
        
        /* සයිට් එකට එද්දී එන Animation එක */
        animation: logoEntrance 1.5s cubic-bezier(0.68, -0.55, 0.27, 1.55) forwards;
        transition: 0.6s ease-in-out;
        box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
    }

    /* Mouse එක උඩට ගියාම වෙන දේ */
    .logo:hover { 
        transform: rotateY(360deg) scale(1.1); 
        box-shadow: 0 0 30px rgba(212, 175, 55, 0.6);
        border-color: #fff;
    }

    @keyframes logoEntrance {
        0% { transform: scale(0) rotate(-180deg); opacity: 0; }
        100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
</style>

<div class="logo-container">
    <img src="KME.png" alt="Kinuri Designs Logo" class="logo">
</div>
    </style>
