<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KME LUXURY DESIGNS</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #D4AF37;
            font-family: 'Playfair Display', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding-bottom: 50px;
        }

        /* Logo Section */
        .header {
            margin-top: 50px;
        }
        .header img {
            width: 120px;
            margin-bottom: 10px;
        }

        .brand-name {
            font-size: 24px;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 30px;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
        }

        /* Portfolio Gallery (ඔයාගේ වැඩ ටික) */
        .gallery {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
            width: 100%;
        }

        .card {
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 8px;
            border-radius: 15px;
            background: #050505;
            max-width: 330px;
            width: 85%;
        }
        .card img {
            width: 100%;
            border-radius: 10px;
            display: block;
        }

        /* Glowing Buttons */
        .lux-btn {
            width: 280px;
            background: transparent;
            color: #D4AF37;
            border: 1px solid #D4AF37;
            padding: 15px;
            margin: 10px 0;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 13px;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .lux-btn:active {
            background: #D4AF37;
            color: #000;
            box-shadow: 0 0 30px #D4AF37;
            transform: scale(0.96);
        }

        .lux-btn:hover {
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo-animated.gif.gif" alt="KME Logo">
        <div class="brand-name">KME LUXURY DESIGNS</div>
    </div>

    <div class="gallery">
        <div class="card"><img src="1.jpg.png" alt="Work 1"></div>
        <div class="card"><img src="2.png" alt="Work 2"></div>
        <div class="card"><img src="3.png" alt="Work 3"></div>
    </div>

    <button class="lux-btn" onclick="startExperience()">Experience KME (Play Voice)</button>
    <a href="https://canva.link/zbwo5ma56hbqnuz" target="_blank" class="lux-btn">Full Portfolio (Canva)</a>
    <a href="https://wa.me/94760517560" target="_blank" class="lux-btn">Contact Me</a>

    <audio id="voice" src="mp3-output-ttsfree(dot)com.mp3"></audio>
    <audio id="bgMusic" src="monume-luxury-509454.mp3" loop></audio>

    <script>
        function startExperience() {
            var v = document.getElementById('voice');
            var m = document.getElementById('bgMusic');
            v.play();
            m.volume = 0.2;
            m.play();
        }
    </script>

</body>
</html>
