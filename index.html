       <style>
   <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">

<style>
    body { 
        background-color: #000; 
        color: #D4AF37; 
        font-family: 'Montserrat', sans-serif; 
        margin: 0; 
        text-align: center; 
        overflow-x: hidden;
    }

    /* Elegant Header */
    h1 { 
        font-family: 'Playfair Display', serif;
        font-size: 3.5rem; 
        letter-spacing: 8px; 
        margin-top: 40px;
        text-transform: uppercase;
        animation: slideDown 1.2s ease-out;
    }

    .logo { 
        width: 140px; 
        border-radius: 50%; 
        border: 2px solid #D4AF37; 
        margin-top: 50px;
        transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
    }
    .logo:hover { transform: scale(1.1) rotate(10deg); }

    /* Gallery Styling */
    .gallery { 
        display: flex; 
        flex-wrap: wrap; 
        justify-content: center; 
        gap: 30px; 
        padding: 60px 20px;
        animation: fadeIn 2s ease-in;
    }

    .gallery img { 
        width: 320px; 
        height: auto;
        border-radius: 12px; 
        border: 1px solid #1a1a1a; 
        transition: all 0.5s ease;
        filter: brightness(0.8);
    }

    .gallery img:hover { 
        transform: translateY(-15px) scale(1.05); 
        filter: brightness(1.1);
        border-color: #D4AF37; 
        box-shadow: 0 15px 40px rgba(212, 175, 55, 0.3);
    }

    /* Modern Footer Area */
    footer { 
        background: linear-gradient(to top, #0a0a0a, #000);
        padding: 100px 20px; 
        border-top: 1px solid #1a1a1a; 
    }

    /* Buttons Style */
    .btn { 
        display: inline-block; 
        padding: 18px 45px; 
        margin: 15px; 
        border-radius: 50px; 
        text-decoration: none; 
        font-weight: 700; 
        font-size: 0.9rem; 
        letter-spacing: 2px;
        text-transform: uppercase;
        transition: all 0.4s ease;
    }

    .canva-btn { 
        border: 2px solid #D4AF37; 
        color: #D4AF37; 
        background: transparent;
    }

    .canva-btn:hover { 
        background: #D4AF37; 
        color: #000; 
        box-shadow: 0 0 30px rgba(212, 175, 55, 0.5);
        transform: translateY(-3px);
    }

    .wa-btn { 
        background: #D4AF37; 
        color: #000; 
    }

    .wa-btn:hover { 
        background: #fff;
        color: #000;
        transform: translateY(-3px);
        box-shadow: 0 10px 25px rgba(255, 255, 255, 0.2);
    }

    /* Keyframe Animations */
    @keyframes slideDown {
        from { transform: translateY(-50px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    /* Mobile Responsive */
    @media (max-width: 600px) {
        h1 { font-size: 2rem; letter-spacing: 4px; }
        .gallery img { width: 90%; }
    }
</style>
</style>

           Contact on WhatsApp

</body>
