<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KME Luxury Designs | Official Portfolio</title>
    
    <!-- වැදගත්: මේ ලින්ක් දෙක අනිවාර්යයෙන්ම සම්පූර්ණයෙන් තිබිය යුතුයි -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <link href="https://unpkg.com" rel="stylesheet">
    
    <style>
        :root { --gold: #D4AF37; --dark: #000; }
        
        body { 
            margin: 0; padding: 0; 
            background: var(--dark); 
            color: var(--gold); 
            font-family: 'Segoe UI', sans-serif; 
            overflow-x: hidden; 
        }

        /* GOLDEN DUST CANVAS CSS */
        #dust-canvas { 
            position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; 
            z-index: -1; pointer-events: none; 
            background: radial-gradient(circle, #111 0%, #000 100%);
        }

        /* SIDEBAR */
        .sidebar { position: fixed; left: 0; top: 30%; background: rgba(212, 175, 55, 0.1); backdrop-filter: blur(8px); border-radius: 0 12px 12px 0; padding: 25px 12px; z-index: 1000; border: 1px solid rgba(212, 175, 55, 0.2); }
        .sidebar a { display: block; color: var(--gold); margin: 25px 0; font-size: 26px; transition: 0.4s; text-decoration: none; }

        /* HEADER & SECTIONS */
        header { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .logo { width: 160px; cursor: pointer; transition: 0.6s; }
        h1 { font-size: 3rem; letter-spacing: 10px; text-transform: uppercase; }

        section { padding: 100px 12%; text-align: center; }
        
        /* PORTFOLIO GRID */
        .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .project-card { border: 1px solid rgba(212, 175, 55, 0.3); overflow: hidden; border-radius: 15px; height: 250px; background: #080808; }
        .project-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.7s; }

        /* BUTTONS */
        .voice-btn { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 14px 30px; border-radius: 40px; cursor: pointer; text-decoration: none; display: inline-block; font-weight: bold; margin-top: 20px; transition: 0.4s; }
        .voice-btn:hover { background: var(--gold); color: #000; box-shadow: 0 0 20px gold; }
    </style>
</head>
<body>

    <!-- පසුබිමේ රන්වන් අංශු සඳහා -->
    <div id="dust-canvas"></div>

    <div class="sidebar">
        <a href="https://linkedin.com" target="_blank"><i class="fab fa-linkedin"></i></a>
        <a href="https://share.google" target="_blank"><i class="fas fa-briefcase"></i></a>
        <a href="https://wa.me" target="_blank"><i class="fab fa-whatsapp"></i></a>
    </div>

    <header>
        <img src="logo-animated.gif.gif" class="logo" data-aos="zoom-in" onclick="playVoice()">
        <h1 data-aos="fade-down" data-aos-delay="300">KME Luxury Designs</h1>
        <p data-aos="fade-up" data-aos-delay="500">Minimalist Identity • Elegant Branding</p>
        <button class="voice-btn" data-aos="fade-up" data-aos-delay="700" onclick="playVoice()">PLAY VOICE TAG</button>
        <audio id="voiceTag" src="mp3-output-ttsfree(dot)com.mp3"></audio>
    </header>

    <section id="about" data-aos="fade-up">
        <h2>About Me</h2>
        <div style="max-width: 800px; margin: 0 auto; background: rgba(212,175,55,0.05); padding: 40px; border-radius: 20px; border: 1px solid rgba(212,175,55,0.2);">
            <p>I am <strong>Kinuri Edirisinghe</strong>, a 14-year-old visionary Graphic Designer. Certified in Canva Design Essentials, I specialize in crafting high-end visual identities.</p>
        </div>
    </section>

    <section id="projects">
        <h2 data-aos="fade-up">Portfolio Highlights</h2>
        <div class="portfolio-grid">
            <div class="project-card" data-aos="flip-left"><img src="1.jpg.png"></div>
            <div class="project-card" data-aos="flip-left" data-aos-delay="200"><img src="2.png"></div>
            <div class="project-card" data-aos="flip-left" data-aos-delay="400"><img src="3.png"></div>
        </div>
    </section>

    <!-- SCRIPTS - මේවා අනිවාර්යයි -->
    <script src="https://unpkg.com"></script>
    <script>
        // Animations පණ ගැන්වීම
        AOS.init({ duration: 1200, once: true });

        function playVoice() { document.getElementById('voiceTag').play(); }

        // GOLDEN DUST SCRIPT
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        document.getElementById('dust-canvas').appendChild(canvas);
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        let particles = [];
        for(let i=0; i<100; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2,
                speed: Math.random() * 0.5,
                opacity: Math.random()
            });
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                ctx.fillStyle = `rgba(212, 175, 55, ${p.opacity})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
                p.y -= p.speed;
                if(p.y < 0) p.y = canvas.height;
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
