<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KME Luxury Designs | Official Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --black: #050505; }
        body { 
            background: radial-gradient(circle at center, #1a1508 0%, #050505 70%, #000 100%);
            color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; overflow-x: hidden;
        }
        #dust-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .reveal { opacity: 0; transform: translateY(30px); transition: all 1.2s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* LOGO & BRANDING */
        .logo-container { margin: 80px auto 10px auto; width: 200px; height: 200px; display: flex; align-items: center; justify-content: center; }
        .logo-container img { width: 85%; filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.4)); animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .brand-name { font-size: 2.2rem; color: var(--gold); letter-spacing: 8px; text-transform: uppercase; margin-bottom: 40px; font-weight: 300; }

        /* GRID SYSTEM */
        .service-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; padding: 0 10%; margin-top: 30px; }
        .premium-box { 
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(212, 175, 55, 0.15); 
            padding: 30px 20px; border-radius: 20px; backdrop-filter: blur(12px); transition: 0.4s; cursor: pointer;
        }
        .premium-box:hover { border-color: var(--gold); transform: translateY(-5px); box-shadow: 0 10px 40px rgba(212, 175, 55, 0.1); }

        .luxury-btn {
            display: inline-block; background: transparent; color: var(--gold);
            border: 1px solid var(--gold); padding: 10px 25px; font-size: 11px;
            text-transform: uppercase; letter-spacing: 2px; text-decoration: none;
            border-radius: 50px; transition: 0.4s; cursor: pointer; margin-top: 15px;
        }
        .luxury-btn:hover { background: var(--gold); color: #000; box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }

        /* HUB OVERLAY */
        .hub-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 3000; background: rgba(0,0,0,0.98); display: none; align-items: center; justify-content: center; flex-direction: column; backdrop-filter: blur(15px); }
        .hub-content { width: 90%; max-width: 900px; text-align: center; }
        .hub-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-top: 30px; }

        footer { padding: 40px; color: #444; font-size: 11px; letter-spacing: 2px; }
    </style>
</head>
<body>

    <canvas id="dust-canvas"></canvas>

    <div class="logo-container reveal">
        <img src="./logo-animated.gif.gif" alt="KME Logo">
    </div>
    
    <h1 class="brand-name reveal">KME LUXURY DESIGNS</h1>

    <div class="service-grid reveal">
        <div class="premium-box" onclick="openHub('studio')">
            <i class="fas fa-crown" style="color:var(--gold); font-size: 25px; margin-bottom: 10px;"></i>
            <h3>STUDIO</h3>
            <button class="luxury-btn">Portfolio</button>
        </div>

        <div class="premium-box" onclick="openHub('vault')">
            <i class="fas fa-gem" style="color:var(--gold); font-size: 25px; margin-bottom: 10px;"></i>
            <h3>VAULT</h3>
            <button class="luxury-btn">Templates</button>
        </div>

        <div class="premium-box" onclick="openHub('game')">
            <i class="fas fa-gamepad" style="color:var(--gold); font-size: 25px; margin-bottom: 10px;"></i>
            <h3>GAMES</h3>
            <button class="luxury-btn">Play</button>
        </div>

        <div class="premium-box" onclick="openHub('multiverse')" style="border: 1px solid #7000ff33;">
            <i class="fas fa-bolt" style="color:#7000ff; font-size: 25px; margin-bottom: 10px;"></i>
            <h3 style="color:#7000ff;">MULTIVERSE</h3>
            <button class="luxury-btn" style="border-color:#7000ff; color:#7000ff;">Explore</button>
        </div>
    </div>

    <div id="hub-overlay" class="hub-overlay">
        <div style="position:absolute; top:20px; right:20px;">
            <button onclick="closeHub()" class="luxury-btn">CLOSE HUB</button>
        </div>
        <div id="hub-dynamic-content" class="hub-content"></div>
    </div>

    <section id="contact" class="reveal" style="margin-top: 50px;">
        <a href="https://wa.me/94774799172" target="_blank" class="luxury-btn">Contact Kinuri</a>
    </section>

    <footer>&copy; 2026 KME ELITE KINGDOM | CERTIFIED DESIGNER</footer>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            document.querySelectorAll('.reveal').forEach(el => el.classList.add('active'));
        });

        function openHub(type) {
            const overlay = document.getElementById('hub-overlay');
            const content = document.getElementById('hub-dynamic-content');
            overlay.style.display = 'flex';
            
            if(type === 'studio') {
                content.innerHTML = `
                    <h2 style="color:var(--gold); letter-spacing:5px;">STUDIO HUB</h2>
                    <div class="hub-grid">
                        <div class="premium-box"><h4>LOGOS</h4><p style="font-size:10px;">Portfolio Updating...</p></div>
                        <div class="premium-box" onclick="window.location.href='https://wa.me/94774799172'"><h4>ORDER CUSTOM</h4></div>
                    </div>`;
            } else if(type === 'vault') {
                content.innerHTML = `
                    <h2 style="color:var(--gold); letter-spacing:5px;">VAULT HUB</h2>
                    <div class="hub-grid">
                        <div class="premium-box" onclick="window.location.href='https://wa.me/94774799172?text=I want to buy Elite Template 01'">
                            <img src="https://i.ibb.co/wrLBb0tv/Screenshot-2026-05-10-190318.png" style="width:100%; border-radius:10px;">
                            <h4 style="font-size:12px; margin-top:10px;">ELITE TEMPLATE 01</h4>
                            <p style="font-size:10px;">Rs. 500/=</p>
                        </div>
                    </div>`;
            } else if(type === 'game') {
                content.innerHTML = `
                    <h2 style="color:var(--gold); letter-spacing:5px;">GAMING HUB</h2>
                    <div class="hub-grid">
                        <div class="premium-box" onclick="loadFrame('https://www.google.com/logos/2010/pacman10-i.html')"><h4>PACMAN</h4></div>
                        <div class="premium-box" onclick="loadFrame('https://www.retrogames.cc/embed/40238-super-mario-64-usa.html')"><h4>MARIO 3D</h4></div>
                    </div>`;
            } else if(type === 'multiverse') {
                content.innerHTML = `
                    <h2 style="color:#7000ff; letter-spacing:5px;">ELITE MULTIVERSE</h2>
                    <p style="color:#444; font-size:12px;">FAN EDITS, ARTICLES & THEORIES</p>
                    <div class="hub-grid">
                        <div class="premium-box">
                            <i class="fab fa-marvel" style="font-size:30px; color:#e62429;"></i>
                            <h4>MARVEL EDITS</h4>
                            <p style="font-size:9px;">Coming Soon</p>
                        </div>
                        <div class="premium-box">
                            <i class="fas fa-hat-wizard" style="font-size:30px; color:#d4af37;"></i>
                            <h4>WIZARDING WORLD</h4>
                            <p style="font-size:9px;">Pottermore Edits</p>
                        </div>
                        <div class="premium-box">
                            <i class="fas fa-magnifying-glass" style="font-size:30px; color:#fff;"></i>
                            <h4>221B BAKER ST.</h4>
                            <p style="font-size:9px;">Holmes Theories</p>
                        </div>
                    </div>`;
            }
        }

        function loadFrame(url) {
            document.getElementById('hub-dynamic-content').innerHTML = `
                <iframe src="${url}" frameborder="0" width="100%" height="75vh" style="border-radius:20px; border:1px solid var(--gold);"></iframe>
                <button onclick="closeHub()" class="luxury-btn" style="margin-top:15px;">BACK</button>`;
        }

        function closeHub() { document.getElementById('hub-overlay').style.display = 'none'; }

        // DUST ANIMATION
        const canvas = document.getElementById('dust-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        for(let i=0; i<50; i++) particles.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, size:Math.random()*1.5, speed:Math.random()*0.4, opacity:Math.random()});
        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            particles.forEach(p => {
                ctx.fillStyle = `rgba(212,175,55,${p.opacity})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
                p.y -= p.speed; if(p.y < 0) p.y = canvas.height;
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
