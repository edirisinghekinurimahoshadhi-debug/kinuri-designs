<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KME Pro Vault | Exclusive Access</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --black: #050505; }
        
        body {
            background: radial-gradient(circle at center, #1a1508 0%, #050505 70%, #000 100%);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            margin: 0;
            padding: 40px 0; /* දිග පේජ් එකක් නිසා padding ටිකක් දැම්මා */
        }

        .vault-container {
            padding: 40px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            max-width: 600px;
            margin: 0 auto 40px auto;
            animation: fadeIn 1s ease-out;
        }

        .portfolio-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 20px; 
            margin-top: 30px; 
        }

        .content-box { 
            border: 1px solid var(--gold); 
            padding: 20px; 
            border-radius: 15px; 
            background: rgba(255,255,255,0.05); 
        }

        h1, h2 { color: var(--gold); letter-spacing: 5px; font-weight: 300; }
        
        .luxury-btn {
            display: inline-block;
            background: var(--gold);
            color: #000;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 2px;
            transition: 0.4s;
            margin: 10px;
            cursor: pointer;
            border: none;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="vault-container">
        <div style="font-size: 50px; margin-bottom: 20px;">💎</div>
        <h1>PRO VAULT ACCESS</h1>
        <p>You have successfully unlocked the Elite Vault.</p>
        
        <h2 style="font-size: 1.2rem; margin-top: 40px;">EXCLUSIVE PRO FEATURES</h2>
        
        <div class="portfolio-grid">
            <div class="content-box">
                <h4>PRO GAME: Memory Match</h4>
                <p style="font-size: 11px; color: #aaa;">Test your designer eye by matching luxury patterns.</p>
                <button class="luxury-btn" style="font-size: 10px;" onclick="alert('Coming Soon!')">Play Now</button>
            </div>
            
            <div class="content-box">
                <h4>EXPORT SECRETS</h4>
                <p style="font-size: 11px; color: #aaa;">Download our premium quality guide.</p>
                <button class="luxury-btn" style="font-size: 10px;" onclick="alert('Downloading...')">Catalog</button>
            </div>
        </div>

        <div style="margin-top: 40px;">
            <a href="https://wa.me/94774799172?text=I am a Pro Member!" class="luxury-btn">Chat with Kinuri (VIP)</a>
            <br>
            <a href="index.html" style="color: #666; font-size: 11px; text-decoration: none;">Return to Home</a>
        </div>
    </div>

</body>
</html>
