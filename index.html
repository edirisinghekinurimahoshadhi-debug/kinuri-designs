<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinuri Designs | Pro Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --black: #000; --dark-grey: #111; }
        
        body { 
            background-color: var(--black); 
            color: var(--gold); 
            font-family: 'Montserrat', sans-serif; 
            margin: 0; 
            text-align: center; 
            overflow-x: hidden;
        }

        .container { padding: 50px 20px; }

        h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: 3.5rem; 
            letter-spacing: 8px; 
            margin-bottom: 5px;
            animation: fadeInDown 1s ease;
        }

        .tagline { color: #888; font-size: 0.9rem; letter-spacing: 3px; margin-bottom: 40px; }

        /* Modern Search Bar */
        .search-box {
            margin-bottom: 50px;
            position: relative;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        #designSearch {
            width: 90%;
            padding: 18px 30px;
            border-radius: 50px;
            border: 1px solid var(--gold);
            background: rgba(212, 175, 55, 0.05);
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: 0.4s;
        }

        #designSearch:focus {
            background: rgba(212, 175, 55, 0.15);
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.3);
            width: 100%;
        }

        /* Responsive Gallery */
        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 25px; 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 20px;
        }

        .design-card { 
            position: relative;
            border-radius: 15px; 
            overflow: hidden; 
            border: 1px solid #222; 
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--dark-grey);
            animation: fadeInUp 0.8s ease backwards;
        }

        .design-card img { 
            width: 100%; 
            height: 100%;
            object-fit: cover;
            display: block; 
            filter: grayscale(20%);
            transition: 0.6s;
        }

        .design-card:hover { 
            transform: translateY(-15px) scale(1.02); 
            border-color: var(--gold); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            z-index: 10;
        }

        .design-card:hover img { 
            filter: grayscale(0%) brightness(1.1);
        }

        /* Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer { 
            margin-top: 100px; 
            padding: 60px 20px; 
            border-top: 1px solid #1a1a1a;
            background: linear-gradient(to bottom, #000, #0a0a0a);
        }

        .btn { 
            display: inline-block; 
            padding: 18px 45px; 
            border-radius: 50px; 
            text-decoration: none; 
            font-weight: bold; 
            transition: 0.4s;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
        }

        .wa-btn { background: var(--gold); color: #000; margin-bottom: 20px; }
        .wa-btn:hover { background: #fff; transform: scale(1.05); }

        /* Hidden for Search */
        .hidden { display: none; }

    </style>
</head>
